<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>レシピAI</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="レシピAI">
<meta name="theme-color" content="#e8590c">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23ff8c42'/><stop offset='1' stop-color='%23e8590c'/></linearGradient></defs><rect width='180' height='180' rx='40' fill='url(%23g)'/><text x='90' y='125' font-size='100' text-anchor='middle'>🍳</text></svg>">
<link rel="manifest" href='data:application/manifest+json;charset=utf-8,{"name":"レシピ提案AI","short_name":"レシピAI","start_url":"./","display":"standalone","background_color":"%23fff7f0","theme_color":"%23e8590c","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 512 512%27><rect width=%27512%27 height=%27512%27 rx=%27110%27 fill=%27%23e8590c%27/><text x=%27256%27 y=%27370%27 font-size=%27300%27 text-anchor=%27middle%27>🍳</text></svg>","sizes":"512x512","type":"image/svg+xml"}]}'>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: linear-gradient(180deg, #fff7f0 0%, #ffe8d6 100%);
    min-height: 100vh;
    color: #333;
    line-height: 1.6;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-touch-callout: none;
    overscroll-behavior-y: contain;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px; }
  header {
    text-align: center;
    padding: 20px 0 12px;
  }
  header h1 {
    margin: 0;
    font-size: 24px;
    color: #e8590c;
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    color: #6b4423;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(232, 89, 12, 0.08);
  }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #8b4513;
  }
  input[type="text"], textarea, select {
    width: 100%;
    padding: 10px 12px;
    font-size: 16px;
    border: 1.5px solid #ffd4b0;
    border-radius: 10px;
    background: #fffaf5;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: #e8590c;
  }
  textarea { resize: vertical; min-height: 60px; }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #ff8c42, #e8590c);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(232, 89, 12, 0.3);
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:active { transform: translateY(1px); box-shadow: 0 2px 6px rgba(232, 89, 12, 0.3); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 6px 12px;
    border: 1.5px solid #ffd4b0;
    border-radius: 20px;
    background: #fffaf5;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .chip.active {
    background: #e8590c;
    color: #fff;
    border-color: #e8590c;
  }
  .loading { text-align: center; padding: 30px 10px; color: #8b4513; }
  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid #ffd4b0;
    border-top-color: #e8590c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .recipe h2 {
    margin: 0 0 8px;
    color: #e8590c;
    font-size: 22px;
  }
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .meta span {
    background: #fff3e6;
    color: #8b4513;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: #8b4513;
    border-left: 4px solid #e8590c;
    padding-left: 10px;
    margin: 18px 0 10px;
  }
  ul.ing { list-style: none; padding: 0; margin: 0; }
  ul.ing li {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px dashed #ffd4b0;
    font-size: 14px;
  }
  ul.ing li:last-child { border-bottom: none; }
  ol.steps { padding-left: 20px; margin: 0; }
  ol.steps li { margin-bottom: 10px; font-size: 14px; }
  .nutri {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    text-align: center;
  }
  .nutri div {
    background: #fff3e6;
    padding: 8px 4px;
    border-radius: 8px;
  }
  .nutri .label { font-size: 10px; color: #8b4513; }
  .nutri .val { font-size: 13px; font-weight: 700; color: #e8590c; }
  .tip {
    background: #fff8ee;
    border-left: 4px solid #ffaa4a;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 6px;
  }
  .error {
    background: #ffe0e0;
    color: #c33;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
  }
  .retry-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #ff8c42, #e8590c);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: auto;
    box-shadow: 0 2px 8px rgba(232, 89, 12, 0.3);
  }
  .apikey-note {
    font-size: 11px;
    color: #8b4513;
    margin-top: 6px;
    line-height: 1.4;
  }
  /* #8: History section styles */
  .history-section {
    margin-top: 8px;
  }
  .history-section .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .history-section .section-header h3 {
    margin: 0;
    font-size: 16px;
    color: #8b4513;
  }
  .history-clear-btn {
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #8b4513;
    background: #fff3e6;
    border: 1.5px solid #ffd4b0;
    border-radius: 8px;
    cursor: pointer;
    width: auto;
    box-shadow: none;
  }
  .history-clear-btn:active {
    background: #ffe8d6;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #ffd4b0;
    cursor: pointer;
    transition: background 0.15s;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item:active { background: #fff3e6; }
  .history-item .history-name {
    font-size: 14px;
    font-weight: 600;
    color: #333;
  }
  .history-item .history-date {
    font-size: 11px;
    color: #8b4513;
    white-space: nowrap;
    margin-left: 12px;
  }
  @media (max-width: 380px) {
    .nutri { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🍳 レシピ提案AI</h1>
    <p>あなたにぴったりのレシピをAIが考えます</p>
  </header>

  <div class="card">
    <div class="field">
      <label>🍽 食べたいもの・料理のイメージ</label>
      <input type="text" id="craving" placeholder="例：さっぱりした和食">
    </div>
    <div class="field">
      <label>🥬 冷蔵庫にある食材</label>
      <textarea id="ingredients" placeholder="例：鶏肉、玉ねぎ、卵"></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label>👥 人数</label>
        <input type="text" id="servings" placeholder="2人">
      </div>
      <div class="field">
        <label>⏱ 調理時間</label>
        <input type="text" id="time" placeholder="30分以内">
      </div>
    </div>
    <div class="field">
      <label>⚠️ 食の制限・アレルギー</label>
      <input type="text" id="allergy" placeholder="例：乳製品NG">
    </div>
    <div class="field">
      <label>📊 難易度</label>
      <div class="chips" id="difficulty">
        <div class="chip" data-val="簡単">簡単</div>
        <div class="chip" data-val="普通">普通</div>
        <div class="chip" data-val="本格的">本格的</div>
      </div>
    </div>
    <div class="field">
      <label>✨ 気分・シーン</label>
      <div class="chips" id="mood">
        <div class="chip" data-val="節約">節約</div>
        <div class="chip" data-val="ダイエット">ダイエット</div>
        <div class="chip" data-val="がっつり">がっつり</div>
        <div class="chip" data-val="おもてなし">おもてなし</div>
        <div class="chip" data-val="ヘルシー">ヘルシー</div>
      </div>
    </div>
    <button id="generate">おまかせでレシピを提案してもらう</button>
  </div>

  <div id="result"></div>
  <div id="history-container"></div>
</div>

<script>
// Workers API エンドポイント（デプロイ後に書き換え）
const API_URL = 'https://recipe-api.kero-recipe.workers.dev';

// --- #8: History management ---
const HISTORY_KEY = 'recipeHistory';
const HISTORY_MAX = 10;

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch {
    return [];
  }
}

function saveHistory(history) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch {
    // QuotaExceededError: silently ignore
  }
}

function addToHistory(recipe) {
  const history = loadHistory();
  const entry = {
    name: recipe.name || '名前なし',
    date: new Date().toLocaleString('ja-JP'),
    recipe: recipe,
  };
  history.unshift(entry);
  if (history.length > HISTORY_MAX) history.pop();
  saveHistory(history);
  renderHistory();
}

function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('history-container');
  const history = loadHistory();
  if (history.length === 0) {
    container.innerHTML = '';
    return;
  }
  const items = history.map((entry, idx) =>
    `<div class="history-item" data-idx="${idx}">
      <span class="history-name">${escapeHtml(entry.name)}</span>
      <span class="history-date">${escapeHtml(entry.date)}</span>
    </div>`
  ).join('');
  container.innerHTML = `
    <div class="card history-section">
      <div class="section-header">
        <h3>📋 履歴</h3>
        <button class="history-clear-btn" id="clear-history">履歴をクリア</button>
      </div>
      ${items}
    </div>
  `;
  document.getElementById('clear-history').addEventListener('click', clearHistory);
  container.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx, 10);
      const entry = loadHistory()[idx];
      if (entry && entry.recipe) {
        renderRecipe(entry.recipe, false);
      }
    });
  });
}

// チップ選択（単一選択）
function setupChips(groupId) {
  const group = document.getElementById(groupId);
  group.addEventListener('click', (e) => {
    if (!e.target.classList.contains('chip')) return;
    const wasActive = e.target.classList.contains('active');
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    if (!wasActive) e.target.classList.add('active');
    updateButtonText();
  });
}
setupChips('difficulty');
setupChips('mood');

function getChipValue(groupId) {
  const active = document.querySelector(`#${groupId} .chip.active`);
  return active ? active.dataset.val : '';
}

// --- #7: Dynamic button text based on input ---
function hasAnyInput() {
  if (document.getElementById('craving').value.trim()) return true;
  if (document.getElementById('ingredients').value.trim()) return true;
  if (document.getElementById('servings').value.trim()) return true;
  if (document.getElementById('time').value.trim()) return true;
  if (document.getElementById('allergy').value.trim()) return true;
  if (getChipValue('difficulty')) return true;
  if (getChipValue('mood')) return true;
  return false;
}

function updateButtonText() {
  const btn = document.getElementById('generate');
  if (btn.disabled) return;
  btn.textContent = hasAnyInput()
    ? 'レシピを提案してもらう'
    : 'おまかせでレシピを提案してもらう';
}

// Attach input listeners for button text update
['craving', 'ingredients', 'servings', 'time', 'allergy'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateButtonText);
});

function buildPrompt() {
  const data = {
    食べたいもの: document.getElementById('craving').value.trim(),
    冷蔵庫の食材: document.getElementById('ingredients').value.trim(),
    人数: document.getElementById('servings').value.trim(),
    調理時間: document.getElementById('time').value.trim(),
    アレルギー制限: document.getElementById('allergy').value.trim(),
    難易度: getChipValue('difficulty'),
    気分シーン: getChipValue('mood'),
  };
  const filled = Object.entries(data)
    .filter(([, v]) => v)
    .map(([k, v]) => `- ${k}: ${v}`)
    .join('\n');

  return `あなたは料理研究家です。以下の条件からレシピを1つ提案してください。
${filled || '- 特に指定なし。おすすめの家庭料理を提案してください。'}

必ず以下のJSON形式のみで回答してください（前後に説明文を付けない）:
{
  "name": "料理名",
  "time": "調理時間（例: 30分）",
  "difficulty": "難易度",
  "cost": "目安費用（円）",
  "ingredients": [{"name": "食材名", "amount": "分量"}],
  "steps": ["手順1", "手順2"],
  "nutrition": {"calories": "kcal", "protein": "g", "carbs": "g", "fat": "g", "salt": "g"},
  "tips": "料理のポイント・アレンジ"
}`;
}

// #9: Robust JSON parsing - try direct parse first, then regex extraction
function parseRecipeJson(text) {
  // First, try parsing the entire text directly
  try {
    return JSON.parse(text);
  } catch {
    // Fall through to regex extraction
  }
  // Extract JSON object from text using regex
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) return null;
  try {
    return JSON.parse(jsonMatch[0]);
  } catch {
    return null;
  }
}

async function generateRecipe() {
  const resultEl = document.getElementById('result');
  const btn = document.getElementById('generate');

  btn.disabled = true;
  resultEl.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div>レシピを考えています...</div></div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: buildPrompt() }),
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => null);
      const errMsg = errData?.error || `API エラー (${res.status})`;
      throw new Error(errMsg);
    }

    const json = await res.json();
    const text = json.text;
    if (!text) throw new Error('レスポンスが空でした');

    // #9: Use robust JSON parser
    const recipe = parseRecipeJson(text);
    // #6: Show retry button on JSON parse failure
    if (!recipe) {
      resultEl.innerHTML = `<div class="card"><div class="error">レシピの生成に失敗しました。もう一度お試しください。<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>`;
      return;
    }
    renderRecipe(recipe, true);
  } catch (e) {
    // #6: Show retry button on error
    resultEl.innerHTML = `<div class="card"><div class="error">${escapeHtml(e.message)}<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>`;
  } finally {
    btn.disabled = false;
    updateButtonText();
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderRecipe(r, addHistory) {
  const ingredients = (r.ingredients || []).map(i =>
    `<li><span>${escapeHtml(i.name)}</span><span>${escapeHtml(i.amount)}</span></li>`
  ).join('');
  const steps = (r.steps || []).map(s => `<li>${escapeHtml(s)}</li>`).join('');
  const n = r.nutrition || {};

  document.getElementById('result').innerHTML = `
    <div class="card recipe">
      <h2>${escapeHtml(r.name || '')}</h2>
      <div class="meta">
        <span>⏱ ${escapeHtml(r.time || '-')}</span>
        <span>📊 ${escapeHtml(r.difficulty || '-')}</span>
        <span>💰 ${escapeHtml(r.cost || '-')}</span>
      </div>
      <div class="section-title">食材</div>
      <ul class="ing">${ingredients}</ul>
      <div class="section-title">作り方</div>
      <ol class="steps">${steps}</ol>
      <div class="section-title">栄養素</div>
      <div class="nutri">
        <div><div class="label">カロリー</div><div class="val">${escapeHtml(n.calories || '-')}</div></div>
        <div><div class="label">たんぱく質</div><div class="val">${escapeHtml(n.protein || '-')}</div></div>
        <div><div class="label">炭水化物</div><div class="val">${escapeHtml(n.carbs || '-')}</div></div>
        <div><div class="label">脂質</div><div class="val">${escapeHtml(n.fat || '-')}</div></div>
        <div><div class="label">塩分</div><div class="val">${escapeHtml(n.salt || '-')}</div></div>
      </div>
      <div class="section-title">ポイント・アレンジ</div>
      <div class="tip">${escapeHtml(r.tips || '')}</div>
    </div>
  `;
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });

  // #8: Save to history (only for new recipes, not history re-display)
  if (addHistory !== false) {
    addToHistory(r);
  }
}

document.getElementById('generate').addEventListener('click', generateRecipe);

// Initialize history on load
renderHistory();
</script>
</body>
</html>
