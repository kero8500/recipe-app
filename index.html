<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: linear-gradient(180deg, #fff7f0 0%, #ffe8d6 100%);
    min-height: 100vh;
    color: #333;
    line-height: 1.6;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-touch-callout: none;
    overscroll-behavior-y: contain;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 16px; }
  header {
    text-align: center;
    padding: 20px 0 12px;
  }
  header h1 {
    margin: 0;
    font-size: 24px;
    color: #e8590c;
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    color: #6b4423;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(232, 89, 12, 0.08);
  }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #8b4513;
  }
  input[type="text"], textarea, select {
    width: 100%;
    padding: 10px 12px;
    font-size: 16px;
    border: 1.5px solid #ffd4b0;
    border-radius: 10px;
    background: #fffaf5;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: #e8590c;
  }
  textarea { resize: vertical; min-height: 60px; }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #ff8c42, #e8590c);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(232, 89, 12, 0.3);
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:active { transform: translateY(1px); box-shadow: 0 2px 6px rgba(232, 89, 12, 0.3); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  /* #13: Cancel state button style */
  button.cancel-state {
    background: linear-gradient(135deg, #9ca3af, #6b7280);
    box-shadow: 0 4px 12px rgba(107, 114, 128, 0.3);
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 6px 12px;
    border: 1.5px solid #ffd4b0;
    border-radius: 20px;
    background: #fffaf5;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .chip.active {
    background: #e8590c;
    color: #fff;
    border-color: #e8590c;
  }
  .loading { text-align: center; padding: 30px 10px; color: #8b4513; }
  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid #ffd4b0;
    border-top-color: #e8590c;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .recipe h2 {
    margin: 0 0 8px;
    color: #e8590c;
    font-size: 22px;
  }
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .meta span {
    background: #fff3e6;
    color: #8b4513;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: #8b4513;
    border-left: 4px solid #e8590c;
    padding-left: 10px;
    margin: 18px 0 10px;
  }
  ul.ing { list-style: none; padding: 0; margin: 0; }
  ul.ing li {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px dashed #ffd4b0;
    font-size: 14px;
  }
  ul.ing li:last-child { border-bottom: none; }
  ol.steps { padding-left: 20px; margin: 0; }
  ol.steps li { margin-bottom: 10px; font-size: 14px; }
  .nutri {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    text-align: center;
  }
  .nutri div {
    background: #fff3e6;
    padding: 8px 4px;
    border-radius: 8px;
  }
  .nutri .label { font-size: 10px; color: #8b4513; }
  .nutri .val { font-size: 13px; font-weight: 700; color: #e8590c; }
  .tip {
    background: #fff8ee;
    border-left: 4px solid #ffaa4a;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 6px;
  }
  .error {
    background: #ffe0e0;
    color: #c33;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
  }
  .retry-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #ff8c42, #e8590c);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: auto;
    box-shadow: 0 2px 8px rgba(232, 89, 12, 0.3);
  }
  .apikey-note {
    font-size: 11px;
    color: #8b4513;
    margin-top: 6px;
    line-height: 1.4;
  }
  /* #8: History section styles */
  .history-section {
    margin-top: 8px;
  }
  .history-section .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .history-section .section-header h3 {
    margin: 0;
    font-size: 16px;
    color: #8b4513;
  }
  .history-clear-btn {
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #8b4513;
    background: #fff3e6;
    border: 1.5px solid #ffd4b0;
    border-radius: 8px;
    cursor: pointer;
    width: auto;
    box-shadow: none;
  }
  .history-clear-btn:active {
    background: #ffe8d6;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #ffd4b0;
    cursor: pointer;
    transition: background 0.15s;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item:active { background: #fff3e6; }
  .history-item .history-name {
    font-size: 14px;
    font-weight: 600;
    color: #333;
  }
  .history-item .history-date {
    font-size: 11px;
    color: #8b4513;
    white-space: nowrap;
    margin-left: 12px;
  }

  /* Favorite button in recipe card */
  .fav-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    width: auto;
    box-shadow: none;
    margin-top: 6px;
  }
  .fav-btn.not-faved {
    color: #e8590c;
    background: #fff3e6;
    border: 1.5px solid #ffd4b0;
  }
  .fav-btn.not-faved:active {
    background: #ffe8d6;
  }
  .fav-btn.faved {
    color: #fff;
    background: linear-gradient(135deg, #ff6b6b, #e8590c);
    border: 1.5px solid transparent;
  }
  .fav-btn.faved:active {
    opacity: 0.85;
  }

  /* Favorites section styles */
  .favorites-section {
    margin-top: 8px;
  }
  .favorites-section .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .favorites-section .section-header h3 {
    margin: 0;
    font-size: 16px;
    color: #8b4513;
  }
  .fav-clear-btn {
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #8b4513;
    background: #fff3e6;
    border: 1.5px solid #ffd4b0;
    border-radius: 8px;
    cursor: pointer;
    width: auto;
    box-shadow: none;
  }
  .fav-clear-btn:active {
    background: #ffe8d6;
  }
  .fav-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #ffd4b0;
    transition: background 0.15s;
  }
  .fav-item:last-child { border-bottom: none; }
  .fav-item-info {
    flex: 1;
    cursor: pointer;
    min-width: 0;
  }
  .fav-item-info:active { opacity: 0.7; }
  .fav-item .fav-name {
    font-size: 14px;
    font-weight: 600;
    color: #333;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fav-item .fav-date {
    font-size: 11px;
    color: #8b4513;
    margin-top: 2px;
  }
  .fav-delete-btn {
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    color: #c33;
    background: #ffe0e0;
    border: 1px solid #ffc0c0;
    border-radius: 6px;
    cursor: pointer;
    width: auto;
    box-shadow: none;
    margin-left: 10px;
    flex-shrink: 0;
  }
  .fav-delete-btn:active {
    background: #ffd0d0;
  }

  /* Shopping list button in recipe card */
  .shop-add-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    width: auto;
    box-shadow: none;
    margin-top: 6px;
    margin-left: 6px;
  }
  .shop-add-btn.not-added {
    color: #2e7d32;
    background: #e8f5e9;
    border: 1.5px solid #a5d6a7;
  }
  .shop-add-btn.not-added:active {
    background: #c8e6c9;
  }
  .shop-add-btn.added {
    color: #fff;
    background: linear-gradient(135deg, #66bb6a, #2e7d32);
    border: 1.5px solid transparent;
    cursor: default;
  }

  /* Shopping list section styles */
  .shopping-section {
    margin-top: 8px;
  }
  .shopping-section .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .shopping-section .section-header h3 {
    margin: 0;
    font-size: 16px;
    color: #8b4513;
  }
  .shopping-section .section-header .shop-actions {
    display: flex;
    gap: 6px;
  }
  .shop-clear-btn, .shop-clear-checked-btn {
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    width: auto;
    box-shadow: none;
  }
  .shop-clear-checked-btn {
    color: #2e7d32;
    background: #e8f5e9;
    border: 1.5px solid #a5d6a7;
  }
  .shop-clear-checked-btn:active {
    background: #c8e6c9;
  }
  .shop-clear-btn {
    color: #8b4513;
    background: #fff3e6;
    border: 1.5px solid #ffd4b0;
  }
  .shop-clear-btn:active {
    background: #ffe8d6;
  }
  .shop-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid #ffd4b0;
    transition: background 0.15s;
    gap: 10px;
  }
  .shop-item:last-child { border-bottom: none; }
  .shop-item.checked {
    opacity: 0.55;
  }
  .shop-item.checked .shop-item-name,
  .shop-item.checked .shop-item-amount {
    text-decoration: line-through;
    color: #999;
  }
  .shop-item-check {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    min-width: 20px;
    border: 2px solid #a5d6a7;
    border-radius: 5px;
    cursor: pointer;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .shop-item-check:checked {
    background: #2e7d32;
    border-color: #2e7d32;
  }
  .shop-item-check:checked::after {
    content: '';
    display: block;
    width: 5px;
    height: 10px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    margin-bottom: 2px;
  }
  .shop-item-info {
    flex: 1;
    min-width: 0;
  }
  .shop-item-name {
    font-size: 14px;
    font-weight: 600;
    color: #333;
  }
  .shop-item-amount {
    font-size: 13px;
    color: #666;
    margin-left: 6px;
  }
  .shop-item-recipe {
    font-size: 11px;
    color: #8b4513;
    margin-top: 1px;
  }
  .shop-delete-btn {
    padding: 2px 8px;
    font-size: 14px;
    font-weight: 600;
    color: #c33;
    background: #ffe0e0;
    border: 1px solid #ffc0c0;
    border-radius: 6px;
    cursor: pointer;
    width: auto;
    box-shadow: none;
    flex-shrink: 0;
    line-height: 1;
  }
  .shop-delete-btn:active {
    background: #ffd0d0;
  }

  /* Meal (1食分献立) styles */
  .btn-meal {
    background: linear-gradient(135deg, #66bb6a, #2e7d32);
    box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
    margin-top: 10px;
  }
  .btn-meal:active {
    box-shadow: 0 2px 6px rgba(46, 125, 50, 0.3);
  }
  .meal-header h2 {
    margin: 0 0 8px;
    color: #2e7d32;
    font-size: 22px;
  }
  .meal-summary {
    background: #e8f5e9;
    border-left: 4px solid #2e7d32;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    color: #1b5e20;
    margin-bottom: 14px;
  }
  .dish-block {
    background: #fafafa;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
    border: 1px solid #e0e0e0;
  }
  .dish-block:last-child { margin-bottom: 0; }
  .dish-role {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #fff;
  }
  .dish-role.main { background: #e8590c; }
  .dish-role.side { background: #2e7d32; }
  .dish-role.soup { background: #1976d2; }
  .dish-role.other { background: #757575; }
  .dish-name {
    font-size: 17px;
    font-weight: 700;
    color: #333;
    margin: 2px 0 6px;
  }
  .dish-meta {
    font-size: 12px;
    color: #666;
    margin-bottom: 8px;
  }
  .dish-sub-title {
    font-size: 13px;
    font-weight: 700;
    color: #555;
    margin: 10px 0 4px;
  }
  .dish-block ul.ing li { font-size: 13px; padding: 5px 0; }
  .dish-block ol.steps li { font-size: 13px; margin-bottom: 6px; }

  /* Weekly (1週間分献立) styles */
  .btn-weekly {
    background: linear-gradient(135deg, #9575cd, #5e35b1);
    box-shadow: 0 4px 12px rgba(94, 53, 177, 0.3);
    margin-top: 10px;
  }
  .btn-weekly:active {
    box-shadow: 0 2px 6px rgba(94, 53, 177, 0.3);
  }
  .weekly-header h2 {
    margin: 0 0 8px;
    color: #5e35b1;
    font-size: 22px;
  }
  .weekly-summary {
    background: #ede7f6;
    border-left: 4px solid #5e35b1;

    border-radius: 8px;
    font-size: 13px;
    color: #311b92;
    margin-bottom: 14px;
  }
  .day-tabs {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding-bottom: 8px;
    margin-bottom: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .day-tab {
    flex: 0 0 auto;
    padding: 8px 14px;
    border-radius: 18px;
    background: #f3e5f5;
    color: #5e35b1;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    white-space: nowrap;
    user-select: none;
  }
  .day-tab:active { background: #e1bee7; }
  .day-tab.active {
    background: #5e35b1;
    color: #fff;
    border-color: #5e35b1;
  }
  .day-panel { display: none; }
  .day-panel.active { display: block; }
  .day-title {
    font-size: 16px;
    font-weight: 700;
    color: #5e35b1;
    margin: 4px 0 10px;

  .day-total {

    margin-left: 8px;
  }
  .weekly-shop-btn {
    margin-top: 12px;

  }
  .weekly-shop-btn.added {
    background: linear-gradient(135deg, #a5d6a7, #4caf50);
    box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
  }

  /* #14: Small smartphone (max-width: 480px) */
  @media (max-width: 480px) {
    header h1 { font-size: 22px; }
    header p { font-size: 12px; }
    .card { padding: 14px; }
    .recipe h2 { font-size: 20px; }
    .section-title { font-size: 14px; }
    .nutri { grid-template-columns: repeat(3, 1fr); }
  }

  /* #14: Very small smartphone (max-width: 380px) */
  @media (max-width: 380px) {
    header h1 { font-size: 20px; }
    .wrap { padding: 10px; }
    .card { padding: 12px; }
    .nutri { grid-template-columns: repeat(3, 1fr); }
    ul.ing li { font-size: 13px; }
    ol.steps li { font-size: 13px; }
  }

  /* #14: PC / tablet (min-width: 641px) */
  @media (min-width: 641px) {
    .wrap { max-width: 720px; padding: 24px; }
    header { padding: 28px 0 16px; }
    header h1 { font-size: 28px; }
    header p { font-size: 14px; }
    .card { padding: 24px; margin-bottom: 20px; border-radius: 20px; }
    .field { margin-bottom: 18px; }
    input[type="text"], textarea, select { padding: 12px 14px; }
    button { padding: 16px; font-size: 17px; }
    .recipe h2 { font-size: 26px; }
    .section-title { font-size: 16px; }
    .nutri { gap: 10px; }
    .nutri div { padding: 12px 6px; }
    .nutri .val { font-size: 15px; }
  }

  /* === New features CSS (TOP5 additions) === */
  /* Top menu (tabs) */
  .top-menu {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 0 0 12px;
  }
  .top-menu button {
    flex: 1 1 auto;
    min-width: 0;
    padding: 10px 8px;
    font-size: 12px;
    font-weight: 700;
    color: #8b4513;
    background: #fff;
    border: 1.5px solid #ffd4b0;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: none;
    white-space: nowrap;
  }
  .top-menu button.active {
    background: #e8590c;
    color: #fff;
    border-color: #e8590c;
  }
  .remix-hint {
    font-size: 12px;
    color: #8b4513;
    background: #fff8ee;
    border-left: 4px solid #ffaa4a;
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 10px;
  }
  /* Fridge (inventory) */
  .fridge-item {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr auto;
    gap: 6px;
    padding: 8px 4px;
    border-bottom: 1px dashed #ffd4b0;
    align-items: center;

<script>
// #12: Service Worker registration (inline via Blob URL for single-file architecture)
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'recipe-ai-v1';
    const STATIC_ASSETS = ['/'];

    self.addEventListener('install', (event) => {
      event.waitUntil(
        caches.open(CACHE_NAME).then((cache) => cache.addAll(STATIC_ASSETS))
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', (event) => {
      event.waitUntil(
        caches.keys().then((keys) =>
          Promise.all(keys.filter((k) => k !== CACHE_NAME).map((k) => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', (event) => {
      const url = new URL(event.request.url);

      // Do not cache API requests
      if (url.origin !== self.location.origin) return;

      // Network First strategy
      event.respondWith(
        fetch(event.request)
          .then((response) => {
            const clone = response.clone();
            caches.open(CACHE_NAME).then((cache) => cache.put(event.request, clone));
            return response;
          })
          .catch(() => caches.match(event.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {
    // Service Worker registration failed silently (e.g., non-HTTPS context)
  });
}

// Workers API endpoint
const API_URL = 'https://recipe-api.kero-recipe.workers.dev';

// #13: AbortController for cancel functionality
let currentAbortController = null;

// --- #8: History management ---
const HISTORY_KEY = 'recipeHistory';
const HISTORY_MAX = 10;

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch {
    return [];
  }
}

function saveHistory(history) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch {
    // QuotaExceededError: silently ignore
  }
}

function addToHistory(recipe) {
  const history = loadHistory();
  const entry = {
    name: recipe.name || '名前なし',
    date: new Date().toLocaleString('ja-JP'),
    recipe: recipe,
  };
  history.unshift(entry);
  if (history.length > HISTORY_MAX) history.pop();
  saveHistory(history);
  renderHistory();
}

function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('history-container');
  const history = loadHistory();
  if (history.length === 0) {
    container.innerHTML = '';
    return;
  }
  const items = history.map((entry, idx) =>
    `<div class="history-item" data-idx="${idx}">
      <span class="history-name">${escapeHtml(entry.name)}</span>
      <span class="history-date">${escapeHtml(entry.date)}</span>
    </div>`
  ).join('');
  container.innerHTML = `
    <div class="card history-section">
      <div class="section-header">
        <h3>📋 履歴</h3>
        <button class="history-clear-btn" id="clear-history">履歴をクリア</button>
      </div>
      ${items}
    </div>
  `;
  document.getElementById('clear-history').addEventListener('click', clearHistory);
  container.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx, 10);
      const entry = loadHistory()[idx];
      if (entry && entry.recipe) {
        renderEntry(entry.recipe);
      }
    });
  });
}

// --- Favorites management ---
const FAVORITES_KEY = 'recipe_favorites';
const FAVORITES_MAX = 50;

function loadFavorites() {
  try {
    return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];
  } catch {
    return [];
  }
}

function saveFavorites(favorites) {
  try {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      alert('ストレージの容量が不足しています。古いお気に入りを削除してください。');
    }
  }
}

function getFavoriteKey(recipe) {
  // Use recipe name as the unique key for matching
  return (recipe.name || '').trim();
}

function isFavorite(recipe) {
  const key = getFavoriteKey(recipe);
  if (!key) return false;
  const favorites = loadFavorites();
  return favorites.some(f => getFavoriteKey(f.recipe) === key);
}

function addFavorite(recipe) {
  const favorites = loadFavorites();
  if (favorites.length >= FAVORITES_MAX) {
    alert('お気に入りが上限（50件）に達しました。古いお気に入りを削除してから追加してください。');
    return false;
  }
  if (isFavorite(recipe)) return false;
  const entry = {
    id: 'fav_' + Date.now(),
    recipe: recipe,
    savedAt: new Date().toISOString(),
  };
  favorites.unshift(entry);
  saveFavorites(favorites);
  renderFavorites();
  return true;
}

function removeFavorite(recipe) {
  const key = getFavoriteKey(recipe);
  let favorites = loadFavorites();
  favorites = favorites.filter(f => getFavoriteKey(f.recipe) !== key);
  saveFavorites(favorites);
  renderFavorites();
}

function removeFavoriteById(id) {
  let favorites = loadFavorites();
  favorites = favorites.filter(f => f.id !== id);
  saveFavorites(favorites);
  renderFavorites();
}

function clearFavorites() {
  localStorage.removeItem(FAVORITES_KEY);
  renderFavorites();
}

function toggleFavorite(recipe) {
  if (isFavorite(recipe)) {
    removeFavorite(recipe);
    return false;
  } else {
    return addFavorite(recipe);
  }
}

function renderFavorites() {
  const container = document.getElementById('favorites-container');
  const favorites = loadFavorites();
  if (favorites.length === 0) {
    container.innerHTML = '';
    return;
  }
  const items = favorites.map(entry => {
    const savedDate = new Date(entry.savedAt).toLocaleString('ja-JP');
    const name = entry.recipe.name || '名前なし';
    return `<div class="fav-item" data-id="${escapeHtml(entry.id)}">
      <div class="fav-item-info" data-id="${escapeHtml(entry.id)}">
        <div class="fav-name">⭐ ${escapeHtml(name)}</div>
        <div class="fav-date">${escapeHtml(savedDate)}</div>
      </div>
      <button class="fav-delete-btn" data-id="${escapeHtml(entry.id)}">削除</button>
    </div>`;
  }).join('');
  container.innerHTML = `
    <div class="card favorites-section">
      <div class="section-header">
        <h3>⭐ お気に入り</h3>
        <button class="fav-clear-btn" id="clear-favorites">すべてクリア</button>
      </div>
      ${items}
    </div>
  `;
  document.getElementById('clear-favorites').addEventListener('click', () => {
    if (confirm('お気に入りをすべて削除しますか？')) {
      clearFavorites();
      updateFavButtonInResult();
    }
  });
  container.querySelectorAll('.fav-item-info').forEach(info => {
    info.addEventListener('click', () => {
      const id = info.dataset.id;
      const favorites = loadFavorites();
      const entry = favorites.find(f => f.id === id);
      if (entry && entry.recipe) {
        renderEntry(entry.recipe);
      }
    });
  });
  container.querySelectorAll('.fav-delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      removeFavoriteById(id);
      updateFavButtonInResult();
    });
  });
}

// Update the favorite button in the currently displayed recipe card (if any)
function updateFavButtonInResult() {
  const favBtn = document.querySelector('#result .fav-btn');
  if (!favBtn || !favBtn._recipe) return;
  const faved = isFavorite(favBtn._recipe);
  favBtn.className = 'fav-btn ' + (faved ? 'faved' : 'not-faved');
  favBtn.textContent = faved ? '❤️ お気に入り済み' : '🤍 お気に入りに追加';
}

// --- Shopping list management ---
const SHOPPING_KEY = 'recipe_shopping_list';

function loadShoppingList() {
  try {
    return JSON.parse(localStorage.getItem(SHOPPING_KEY)) || [];
  } catch {
    return [];
  }
}

function saveShoppingList(list) {
  try {
    localStorage.setItem(SHOPPING_KEY, JSON.stringify(list));
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      alert('ストレージの容量が不足しています。買い物リストを整理してください。');
    }
  }
}

function addIngredientsToShoppingList(recipe) {
  const list = loadShoppingList();
  const ingredients = recipe.ingredients || [];
  const recipeName = recipe.name || '名前なし';
  const now = new Date().toISOString();
  let addedCount = 0;

  ingredients.forEach((ing, idx) => {
    const name = (ing.name || '').trim();
    if (!name) return;
    // Deduplicate by ingredient name (regardless of recipe)
    const exists = list.some(item => item.name === name);
    if (!exists) {
      list.push({
        id: 'shop_' + Date.now() + '_' + idx,
        name: name,
        amount: (ing.amount || '').trim(),
        recipeName: recipeName,
        checked: false,
        addedAt: now,
      });
      addedCount++;
    }
  });

  saveShoppingList(list);
  renderShoppingList();
  return addedCount;
}

function isRecipeInShoppingList(recipe) {
  const list = loadShoppingList();
  const ingredients = recipe.ingredients || [];
  if (ingredients.length === 0) return false;
  // Consider "added" if ALL ingredients are already in the list
  return ingredients.every(ing => {
    const name = (ing.name || '').trim();
    if (!name) return true; // skip empty names
    return list.some(item => item.name === name);
  });
}

function toggleShoppingItemCheck(id) {
  const list = loadShoppingList();
  const item = list.find(i => i.id === id);
  if (item) {
    item.checked = !item.checked;
    saveShoppingList(list);
    renderShoppingList();
  }
}

function removeShoppingItem(id) {
  let list = loadShoppingList();
  list = list.filter(i => i.id !== id);
  saveShoppingList(list);
  renderShoppingList();
  updateShopButtonInResult();
}

function removeCheckedShoppingItems() {
  let list = loadShoppingList();
  list = list.filter(i => !i.checked);

  renderShoppingList();
  updateShopButtonInResult();
}

    return `<div class="shop-item${checkedClass}" data-id="${escapeHtml(item.id)}">

    : '';

    if (confirm('買い物リストをすべてクリアしますか？')) {
      clearShoppingList();

  });

  const clearCheckedEl = document.getElementById('clear-checked-shopping');
  if (clearCheckedEl) {

      toggleShoppingItemCheck(cb.dataset.id);
    });

  // Event: delete buttons
  container.querySelectorAll('.shop-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      removeShoppingItem(btn.dataset.id);
    });
  });
}

function setupChips(groupId) {
  const group = document.getElementById(groupId);
  group.addEventListener('click', (e) => {
    if (!e.target.classList.contains('chip')) return;
    toggleChip(e.target, group);
  });

// #9: Robust JSON parsing - try direct parse first, then regex extraction
function parseRecipeJson(text) {
  // First, try parsing the entire text directly
  try {
    return JSON.parse(text);
  } catch {
    // Fall through to regex extraction
  }
  // Extract JSON object from text using regex
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) return null;
  try {
    return JSON.parse(jsonMatch[0]);
  } catch {
    return null;
  }
}

async function generateRecipe() {
  const resultEl = document.getElementById('result');
  const btn = document.getElementById('generate');

  // #13: If currently loading, cancel the request
  if (currentAbortController) {
    currentAbortController.abort();
    return;
  }

  // #13: Create AbortController for this request
  currentAbortController = new AbortController();

  const mealBtn = document.getElementById('generate-meal');
  btn.disabled = false;
  btn.textContent = 'キャンセル';
  btn.classList.add('cancel-state');
  btn.setAttribute('aria-busy', 'true');
  if (mealBtn) mealBtn.disabled = true;
  resultEl.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div>レシピを考えています...</div></div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: buildPrompt() }),
      signal: currentAbortController.signal,
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => null);
      const errMsg = errData?.error || `API エラー (${res.status})`;
      throw new Error(errMsg);
    }

    const json = await res.json();
    const text = json.text;
    if (!text) throw new Error('レスポンスが空でした');

    // #9: Use robust JSON parser
    const recipe = parseRecipeJson(text);
    // #6: Show retry button on JSON parse failure
    if (!recipe) {
      resultEl.innerHTML = `<div class="card"><div class="error">レシピの生成に失敗しました。もう一度お試しください。<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>`;
      return;
    }
    renderRecipe(recipe, true);
  } catch (e) {
    // #13: Handle abort (cancel)
    if (e.name === 'AbortError') {
      resultEl.innerHTML = '<div class="card"><div class="error">リクエストをキャンセルしました。</div></div>';
    } else {
      // #6: Show retry button on error
      resultEl.innerHTML = `<div class="card"><div class="error">${escapeHtml(e.message)}<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>`;
    }
  } finally {
    currentAbortController = null;
    btn.classList.remove('cancel-state');
    btn.disabled = false;
    btn.setAttribute('aria-busy', 'false');
    const mb = document.getElementById('generate-meal');
    if (mb) mb.disabled = false;
    updateButtonText();
  }
}

}

// --- Weekly (1週間分献立) feature ---
const WEEKLY_DAYS_TOTAL = 7;
// Split into 3 requests: days [1,2,3], [4,5], [6,7] to stay within MAX_TOKENS budget
const WEEKLY_BATCHES = [[1, 2, 3], [4, 5], [6, 7]];

function buildWeeklyPrompt(dayNumbers, sharedContext) {
  const data = sharedContext;
  const filled = Object.entries(data)
    .filter(function (kv) { return kv[1]; })
    .map(function (kv) { return '- ' + kv[0] + ': ' + kv[1]; })
    .join('\n');

  const dayList = dayNumbers.join(', ');
  return 'あなたは料理研究家です。1週間分の夕食献立のうち、Day ' + dayList + ' の献立を提案してください。' +
    '各日は主菜1・副菜1・汁物1の計3品で構成します。食材の使い回しを意識し、栄養バランスを考慮してください。\n' +
    '【共通条件】\n' +
    (filled || '- 特に指定なし。家庭的でバランスの良い献立にしてください。') +
    '\n\n必ず以下のJSON形式のみで回答してください（前後に説明文を付けない。手順は各品2〜3ステップで極めて簡潔に）:\n' +
    '{\n' +
    '  "days": [\n' +
    '    {\n' +
    '      "day": ' + dayNumbers[0] + ',\n' +
    '      "title": "その日の献立の短いタイトル",\n' +
    '      "totalTime": "全体の所要時間",\n' +
    '      "dishes": [\n' +
    '        {"role": "主菜", "name": "料理名", "time": "調理時間", "ingredients": [{"name": "食材名", "amount": "分量"}], "steps": ["手順1", "手順2"]},\n' +
    '        {"role": "副菜", "name": "料理名", "time": "調理時間", "ingredients": [{"name": "食材名", "amount": "分量"}], "steps": ["手順1", "手順2"]},\n' +
    '        {"role": "汁物", "name": "料理名", "time": "調理時間", "ingredients": [{"name": "食材名", "amount": "分量"}], "steps": ["手順1", "手順2"]}\n' +
    '      ]\n' +
    '    }\n' +
    '  ]\n' +
    '}\n' +
    'days 配列には Day ' + dayList + ' の合計 ' + dayNumbers.length + ' 日分を必ず含めてください。day フィールドの番号は指定されたものを使ってください。';
}

function parseWeeklyJson(text) {
  try { return JSON.parse(text); } catch (e) {}
  var m = text.match(/\{[\s\S]*\}/);
  if (!m) return null;
  try { return JSON.parse(m[0]); } catch (e) { return null; }
}

function isWeekly(r) {
  return r && (r.type === 'weekly' || Array.isArray(r.days));
}

function getWeeklyAggregatedIngredients(weekly) {
  // Aggregate by ingredient name across all days; concatenate amounts with "+"
  var map = new Map();
  (weekly.days || []).forEach(function (day) {
    (day.dishes || []).forEach(function (dish) {
      (dish.ingredients || []).forEach(function (ing) {
        if (!ing || !ing.name) return;
        var key = (ing.name || '').trim();
        if (!key) return;
        var amt = (ing.amount || '').trim();
        if (!map.has(key)) {
          map.set(key, { name: key, amounts: amt ? [amt] : [], count: 1 });
        } else {
          var entry = map.get(key);
          if (amt) entry.amounts.push(amt);
          entry.count++;
        }
      });
    });
  });
  var out = [];
  map.forEach(function (v) {
    var amount;
    if (v.amounts.length === 0) {
      amount = v.count > 1 ? ('×' + v.count + '回') : '';
    } else {
      // Join amounts; add count suffix if multiple
      amount = v.amounts.join(' + ');
    }
    out.push({ name: v.name, amount: amount });
  });
  return out;
}

function addWeeklyIngredientsToShoppingList(weekly) {
  var aggregated = getWeeklyAggregatedIngredients(weekly);
  var fauxRecipe = {
    name: (weekly.name || '1週間分の献立') + '（週間）',
    ingredients: aggregated,
  };
  return addIngredientsToShoppingList(fauxRecipe);
}

function isWeeklyInShoppingList(weekly) {
  var aggregated = getWeeklyAggregatedIngredients(weekly);
  return isRecipeInShoppingList({ ingredients: aggregated });
}

async function generateWeekly() {
  const resultEl = document.getElementById('result');
  const btn = document.getElementById('generate-weekly');
  const otherBtns = [
    document.getElementById('generate'),
    document.getElementById('generate-meal'),
  ];

  if (currentAbortController) {
    currentAbortController.abort();
    return;
  }
  currentAbortController = new AbortController();

  btn.textContent = 'キャンセル';
  btn.classList.add('cancel-state');
  btn.setAttribute('aria-busy', 'true');
  otherBtns.forEach(function (b) { if (b) b.disabled = true; });
  resultEl.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div>1週間分の献立を考えています... (数十秒かかることがあります)</div></div></div>';

  const sharedContext = {
    食べたいもの: document.getElementById('craving').value.trim(),
    冷蔵庫の食材: document.getElementById('ingredients').value.trim(),
    人数: document.getElementById('servings').value.trim(),
    調理時間: document.getElementById('time').value.trim(),
    アレルギー制限: document.getElementById('allergy').value.trim(),
    難易度: getChipValue('difficulty'),
    気分シーン: getChipValue('mood'),
  };

  try {
    // Fire all batches in parallel
    const requests = WEEKLY_BATCHES.map(function (days) {
      return fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: buildWeeklyPrompt(days, sharedContext) }),
        signal: currentAbortController.signal,
      }).then(async function (res) {
        if (!res.ok) {
          const errData = await res.json().catch(function () { return null; });
          const errMsg = (errData && errData.error) || ('API エラー (' + res.status + ')');
          throw new Error(errMsg);
        }
        return res.json();
      });
    });

    const responses = await Promise.all(requests);

    // Merge all days
    const allDays = [];
    responses.forEach(function (json, batchIdx) {
      const text = json && json.text;
      if (!text) throw new Error('Day ' + WEEKLY_BATCHES[batchIdx].join(',') + ' のレスポンスが空でした');
      const parsed = parseWeeklyJson(text);
      if (!parsed || !Array.isArray(parsed.days)) {
        throw new Error('Day ' + WEEKLY_BATCHES[batchIdx].join(',') + ' の解析に失敗しました');
      }
      parsed.days.forEach(function (d) { allDays.push(d); });
    });

    if (allDays.length < WEEKLY_DAYS_TOTAL) {
      // Try best-effort: fill with what we got, but warn
      if (allDays.length === 0) {
        throw new Error('1週間分の献立データが取得できませんでした');
      }
    }

    // Sort by day number and renumber if needed
    allDays.sort(function (a, b) { return (a.day || 0) - (b.day || 0); });
    allDays.forEach(function (d, i) { d.day = i + 1; });

    const stamp = new Date().toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    const weekly = {
      type: 'weekly',
      name: '1週間分の献立 ' + stamp,
      summary: '7日分の夕食献立を提案します。食材の使い回しと栄養バランスを意識しました。',
      days: allDays.slice(0, WEEKLY_DAYS_TOTAL),
    };

    renderWeekly(weekly, true);
  } catch (e) {
    if (e.name === 'AbortError') {
      resultEl.innerHTML = '<div class="card"><div class="error">リクエストをキャンセルしました。</div></div>';
    } else {
      resultEl.innerHTML = '<div class="card"><div class="error">' + escapeHtml(e.message) + '<br><button class="retry-btn" onclick="generateWeekly()">再試行</button></div></div>';
    }
  } finally {
    currentAbortController = null;
    btn.classList.remove('cancel-state');
    btn.textContent = '📅 1週間分の献立を提案してもらう';
    btn.setAttribute('aria-busy', 'false');
    otherBtns.forEach(function (b) { if (b) b.disabled = false; });
    updateButtonText();
  }
}

  const tabs = document.querySelectorAll('#result .day-tab');
  const panels = document.querySelectorAll('#result .day-panel');
  tabs.forEach(function (tab) {
    tab.addEventListener('click', function () {
      const idx = parseInt(tab.dataset.idx, 10);
      tabs.forEach(function (t) { t.classList.remove('active'); });
      panels.forEach(function (p) { p.classList.remove('active'); });
      tab.classList.add('active');

// --- Fridge inventory ---
var FRIDGE_KEY = 'recipeFridge';
var FRIDGE_MAX = 100;
function loadFridge() {
  try { return JSON.parse(localStorage.getItem(FRIDGE_KEY)) || []; } catch { return []; }
}
function saveFridge(list) {
  try { localStorage.setItem(FRIDGE_KEY, JSON.stringify(list)); } catch {}
}
function addFridgeItem(name, amount, expiry) {
  var list = loadFridge();
  if (list.length >= FRIDGE_MAX) {
    alert('冷蔵庫の登録数が上限（' + FRIDGE_MAX + '件）に達しています。古いものを削除してください。');
    return false;
  }
  list.push({
    id: 'fridge-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8),
    name: name, amount: amount, expiry: expiry,
    createdAt: new Date().toISOString(),
  });
  saveFridge(list);
  return true;
}
function removeFridgeItem(id) {
  var list = loadFridge().filter(function (x) { return x.id !== id; });
  saveFridge(list);
}
function fridgeDaysLeft(expiry) {
  if (!expiry) return null;
  var d = new Date(expiry + 'T23:59:59');
  if (isNaN(d)) return null;
  var diff = Math.ceil((d - new Date()) / 86400000);
  return diff;
}
function renderFridge() {
  var container = document.getElementById('fridge-list');
  if (!container) return;
  var list = loadFridge().slice().sort(function (a, b) {
    var da = fridgeDaysLeft(a.expiry);
    var db = fridgeDaysLeft(b.expiry);
    if (da === null && db === null) return 0;
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });
  if (list.length === 0) {
    container.innerHTML = '<div style="color:#8b4513; font-size:13px; padding:10px 0;">まだ在庫が登録されていません。</div>';
    return;
  }
  container.innerHTML = list.map(function (item) {
    var days = fridgeDaysLeft(item.expiry);
    var cls = 'fridge-item';
    var badge = '';
    if (days !== null) {
      if (days < 0) {
        cls += ' expired';
        badge = '<span class="fridge-badge expired">期限切れ</span>';
      } else if (days <= 3) {
        cls += ' expiring';
        badge = '<span class="fridge-badge warn">あと' + days + '日</span>';
      } else {
        badge = '<span class="fridge-badge ok">あと' + days + '日</span>';
      }
    }
    return '<div class="' + cls + '">' +
      '<div>' + escapeHtml(item.name) + badge + '</div>' +
      '<div style="font-size:12px; color:#8b4513;">' + escapeHtml(item.amount || '-') + '</div>' +
      '<div style="font-size:11px; color:#8b4513;">' + escapeHtml(item.expiry || '期限なし') + '</div>' +
      '<button class="fridge-delete-btn" data-id="' + escapeHtml(item.id) + '">削除</button>' +
      '</div>';
  }).join('');
  container.querySelectorAll('.fridge-delete-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      removeFridgeItem(btn.dataset.id);
      renderFridge();
    });
  });
}
(function () {
  var addBtn = document.getElementById('fridge-add');
  if (!addBtn) return;
  addBtn.addEventListener('click', function () {
    var name = document.getElementById('fridge-name').value.trim();
    var amount = document.getElementById('fridge-amount').value.trim();
    var expiry = document.getElementById('fridge-expiry').value;
    if (!name) { alert('食材名を入力してください。'); return; }
    if (addFridgeItem(name, amount, expiry)) {
      document.getElementById('fridge-name').value = '';
      document.getElementById('fridge-amount').value = '';
      document.getElementById('fridge-expiry').value = '';
      renderFridge();

  });
  var useBtn = document.getElementById('fridge-use');
  if (useBtn) {
    useBtn.addEventListener('click', function () {
      var list = loadFridge();
      if (list.length === 0) {
        alert('冷蔵庫が空です。先に食材を追加してください。');

      }
      // Prioritize items expiring soon (<=3 days) or expired
      var prio = list.filter(function (x) {
        var d = fridgeDaysLeft(x.expiry);
        return d !== null && d <= 3;
      });
      var allNames = list.map(function (x) { return x.name + (x.amount ? '(' + x.amount + ')' : ''); }).join('、');
      var prioNames = prio.map(function (x) { return x.name; }).join('、');
      // Fill into main ingredients field + craving, then switch to recipe panel and trigger generateRecipe

})();

    resultEl.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div>リメイクを考えています...</div></div></div>';
    try {
      var prompt = 'あなたは料理研究家です。以下の「余り物・昨日の料理」を活用した、別の新しい一品のレシピを1つ提案してください。余り物をそのまま温めるのではなく、味付け・組み合わせ・調理法を工夫して別料理にリメイクしてください。\n' +
        '【余り物】\n' + leftover + '\n' +
        (wish ? '【希望】\n' + wish + '\n' : '') +
        '\n必ず以下のJSON形式のみで回答してください（前後に説明文を付けない）:\n' +
        '{\n' +
        '  "name": "リメイク料理名",\n' +
        '  "time": "調理時間",\n' +
        '  "difficulty": "難易度",\n' +
        '  "cost": "追加費用の目安",\n' +
        '  "ingredients": [{"name": "食材名", "amount": "分量"}],\n' +
        '  "steps": ["手順1", "手順2"],\n' +
        '  "nutrition": {"calories": "kcal", "protein": "g", "carbs": "g", "fat": "g", "salt": "g"},\n' +
        '  "tips": "リメイクのコツ"\n' +
        '}';
      var res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: prompt }),
        signal: currentAbortController.signal,
      });
      if (!res.ok) {
        var errData = await res.json().catch(function () { return null; });
        throw new Error((errData && errData.error) || ('API エラー (' + res.status + ')'));
      }
      var json = await res.json();
      var text = json.text;
      if (!text) throw new Error('レスポンスが空でした');
      var recipe = parseRecipeJson(text);
      if (!recipe) {
        resultEl.innerHTML = '<div class="card"><div class="error">リメイクの生成に失敗しました。もう一度お試しください。</div></div>';
        return;
      }
      renderRecipe(recipe, true);
    } catch (e) {
      if (e.name === 'AbortError') {
        resultEl.innerHTML = '<div class="card"><div class="error">リクエストをキャンセルしました。</div></div>';
      } else {
        resultEl.innerHTML = '<div class="card"><div class="error">' + escapeHtml(e.message) + '</div></div>';
      }
    } finally {
      currentAbortController = null;
      btn.disabled = false;
      btn.setAttribute('aria-busy', 'false');
    }
  });
})();

// --- Cooking mode (step-by-step fullscreen + Wake Lock) ---
var cookingWakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      cookingWakeLock = await navigator.wakeLock.request('screen');
    }
  } catch { /* ignore */ }
}
function releaseWakeLock() {
  try { if (cookingWakeLock) { cookingWakeLock.release(); cookingWakeLock = null; } } catch {}
}
function buildCookingSteps(recipe) {
  // Returns array of { label, text } for both single recipe and meal
  var steps = [];
  if (recipe && Array.isArray(recipe.steps)) {
    recipe.steps.forEach(function (s, i) {
      steps.push({ label: 'ステップ ' + (i + 1), text: s });
    });
  } else if (recipe && Array.isArray(recipe.dishes)) {
    recipe.dishes.forEach(function (dish) {
      (dish.steps || []).forEach(function (s, i) {
        steps.push({ label: (dish.role || '') + ' ' + (dish.name || '') + ' - ステップ ' + (i + 1), text: s });
      });
    });
  }
  return steps;
}
function buildCookingIngredientsHtml(recipe) {
  // Build ingredients HTML for cooking mode panel. Supports both single recipe and meal (dishes).
  function ingListHtml(list) {
    if (!Array.isArray(list) || list.length === 0) return '';
    return '<ul>' + list.map(function (i) {
      return '<li><span>' + escapeHtml(i.name || '') + '</span><span>' + escapeHtml(i.amount || '') + '</span></li>';
    }).join('') + '</ul>';
  }
  if (recipe && Array.isArray(recipe.ingredients) && recipe.ingredients.length) {
    return ingListHtml(recipe.ingredients);
  }
  if (recipe && Array.isArray(recipe.dishes)) {
    return recipe.dishes.map(function (dish) {
      var title = [dish.role, dish.name].filter(Boolean).map(escapeHtml).join(' ');
      return '<div class="dish-group">' +
        (title ? '<div class="dish-group-title">' + title + '</div>' : '') +
        ingListHtml(dish.ingredients || []) +
        '</div>';
    }).join('');
  }
  return '<div style="color:#888;font-size:12px;">材料情報がありません</div>';
}

function openCookingMode(recipe) {
  var steps = buildCookingSteps(recipe);
  if (steps.length === 0) { alert('手順がありません。'); return; }
  var idx = 0;
  var overlay = document.createElement('div');
  overlay.className = 'cooking-overlay';
  overlay.innerHTML =
    '<div class="cooking-header">' +
      '<div class="cooking-title">' + escapeHtml(recipe.name || '調理モード') + '</div>' +
      '<button type="button" class="cooking-close">✕ 閉じる</button>' +
    '</div>' +
    '<div class="cooking-body">' +
      '<div class="cooking-step-num" id="cook-label"></div>' +
      '<div class="cooking-step-text" id="cook-text"></div>' +
    '</div>' +
    '<div class="cooking-nav">' +
      '<button type="button" id="cook-prev">◀ 前</button>' +
      '<div class="cooking-progress" id="cook-prog"></div>' +
      '<button type="button" id="cook-next">次 ▶</button>' +
    '</div>' +
    '<div class="cooking-ing-panel" id="cook-ing-panel">' +
      '<button type="button" class="cooking-ing-toggle" id="cook-ing-toggle" aria-expanded="false">' +
        '<span>🥬 材料・分量を確認</span><span class="chev">▲</span>' +
      '</button>' +
      '<div class="cooking-ing-list" id="cook-ing-list">' + buildCookingIngredientsHtml(recipe) + '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';

  function render() {
    overlay.querySelector('#cook-label').textContent = steps[idx].label;
    overlay.querySelector('#cook-text').textContent = steps[idx].text;
    overlay.querySelector('#cook-prog').textContent = (idx + 1) + ' / ' + steps.length;
    overlay.querySelector('#cook-prev').disabled = (idx === 0);
    overlay.querySelector('#cook-next').disabled = (idx === steps.length - 1);
  }
  function prev() { if (idx > 0) { idx--; render(); } }
  function next() { if (idx < steps.length - 1) { idx++; render(); } }
  function close() {
    document.body.style.overflow = '';
    overlay.remove();
    releaseWakeLock();
    document.removeEventListener('keydown', onKey);
  }
  function onKey(e) {
    if (e.key === 'ArrowLeft') prev();
    else if (e.key === 'ArrowRight') next();
    else if (e.key === 'Escape') close();
  }
  overlay.querySelector('#cook-prev').addEventListener('click', prev);
  overlay.querySelector('#cook-next').addEventListener('click', next);
  overlay.querySelector('.cooking-close').addEventListener('click', close);
  // Ingredients panel toggle
  var ingPanel = overlay.querySelector('#cook-ing-panel');
  var ingToggle = overlay.querySelector('#cook-ing-toggle');
  if (ingToggle && ingPanel) {
    ingToggle.addEventListener('click', function () {
      var opened = ingPanel.classList.toggle('open');
      ingToggle.setAttribute('aria-expanded', opened ? 'true' : 'false');
    });
  }
  // Swipe
  var startX = null;
  overlay.addEventListener('touchstart', function (e) { startX = e.touches[0].clientX; }, { passive: true });
  overlay.addEventListener('touchend', function (e) {
    if (startX === null) return;
    var dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 50) { if (dx > 0) prev(); else next(); }
    startX = null;
  });
  document.addEventListener('keydown', onKey);
  render();
  requestWakeLock();
  // Re-acquire on visibility regain
  document.addEventListener('visibilitychange', function onVis() {
    if (document.visibilityState === 'visible' && document.body.contains(overlay)) {
      requestWakeLock();
    }
  });
}

// Wire cook buttons (delegated on #result)
document.getElementById('result').addEventListener('click', function (e) {
  if (e.target && e.target.id === 'cook-start') {
    var btn = document.getElementById('fav-toggle');

  }
});

// --- AI food image generation (pollinations.ai, free, no-auth) ---
function buildFoodImagePrompt(recipe) {
  var name = (recipe && recipe.name) || 'Japanese home-cooked dish';
  // Include a few key ingredients as hints to improve fidelity
  var ings = [];
  if (Array.isArray(recipe.ingredients)) {
    ings = recipe.ingredients.slice(0, 5).map(function (i) { return i.name; }).filter(Boolean);
  }
  var hints = ings.length ? (' with ' + ings.join(', ')) : '';
  return name + hints +
    ', Japanese home cooking, realistic food photography, shot from above, natural daylight, on a ceramic plate, appetizing, high detail, 8k';
}
function generateFoodImage(recipe) {
  var box = document.getElementById('recipe-image-box');
  if (!box) return;
  var btn = document.getElementById('gen-image-btn');
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }
  box.innerHTML = '<div class="img-loading"><div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:8px;"></div>完成イメージを生成しています...</div>';
  var prompt = buildFoodImagePrompt(recipe);
  // Deterministic seed so same recipe yields same image (browser cache friendly)
  var seed = 0;
  for (var i = 0; i < prompt.length; i++) { seed = ((seed << 5) - seed + prompt.charCodeAt(i)) | 0; }
  seed = Math.abs(seed) % 1000000;
  var url = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) +
    '?width=768&height=512&seed=' + seed + '&nologo=true&model=flux';
  var img = new Image();
  img.alt = recipe.name || 'AI generated food image';
  img.onload = function () {
    box.innerHTML = '';
    box.appendChild(img);
    var note = document.createElement('div');
    note.className = 'recipe-image-note';
    note.textContent = '※ AIによる参考画像です（pollinations.ai・無料）';
    box.appendChild(note);
    var regen = document.createElement('button');
    regen.className = 'recipe-image-btn';
    regen.type = 'button';
    regen.id = 'gen-image-btn';
    regen.textContent = '🔁 別のイメージを生成';
    regen.style.marginTop = '6px';
    regen.addEventListener('click', function () {
      // Use a fresh random seed to get a different image
      var nurl = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) +
        '?width=768&height=512&seed=' + Math.floor(Math.random() * 1000000) + '&nologo=true&model=flux';
      box.innerHTML = '<div class="img-loading"><div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:8px;"></div>生成中...</div>';
      var ni = new Image();
      ni.alt = img.alt;
      ni.onload = function () { box.innerHTML = ''; box.appendChild(ni); box.appendChild(note); box.appendChild(regen); };
      ni.onerror = function () { box.innerHTML = '<div style="color:#c00;font-size:12px;">画像生成に失敗しました。しばらく待ってから再試行してください。</div>'; };
      ni.src = nurl;
    });
    box.appendChild(regen);
  };
  img.onerror = function () {
    box.innerHTML = '<button class="recipe-image-btn" id="gen-image-btn" type="button">🎨 完成イメージをAIで生成</button>' +
      '<div class="recipe-image-note" style="color:#c00;">画像生成に失敗しました。再度お試しください。</div>';
  };
  img.src = url;
}

// --- Adjust recipe (dialogue refinement) ---
async function adjustCurrentRecipe() {
  var btn = document.getElementById('fav-toggle');
  var currentRecipe = btn && btn._recipe;
  if (!currentRecipe) { alert('対象のレシピがありません。'); return; }
  if (isMeal(currentRecipe) || isWeekly(currentRecipe)) {
    alert('調整は単品レシピのみ対応しています。');
    return;
  }
  var input = document.getElementById('adjust-input');
  var instruction = input && input.value.trim();
  if (!instruction) { alert('調整内容を入力してください。'); return; }

  var goBtn = document.getElementById('adjust-go');
  var resultEl = document.getElementById('result');
  if (currentAbortController) { currentAbortController.abort(); }
  currentAbortController = new AbortController();
  if (goBtn) { goBtn.disabled = true; goBtn.textContent = '調整中...'; }

  try {
    var prompt = 'あなたは料理研究家です。以下の既存レシピを、ユーザーの指示に従って調整し、更新後のレシピをJSONで返してください。料理名・分量・手順・栄養素・ポイントを整合するよう見直してください。\n' +
      '【既存レシピJSON】\n' + JSON.stringify(currentRecipe) + '\n\n' +
      '【調整指示】\n' + instruction + '\n\n' +
      '必ず以下のJSON形式のみで回答してください（前後に説明文を付けない）:\n' +
      '{\n' +
      '  "name": "料理名",\n' +
      '  "time": "調理時間",\n' +
      '  "difficulty": "難易度",\n' +
      '  "cost": "目安費用（円）",\n' +
      '  "ingredients": [{"name": "食材名", "amount": "分量"}],\n' +
      '  "steps": ["手順1", "手順2"],\n' +
      '  "nutrition": {"calories": "kcal", "protein": "g", "carbs": "g", "fat": "g", "salt": "g"},\n' +
      '  "tips": "料理のポイント・アレンジ"\n' +
      '}';
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt }),
      signal: currentAbortController.signal,
    });
    if (!res.ok) {
      var errData = await res.json().catch(function () { return null; });
      throw new Error((errData && errData.error) || ('API エラー (' + res.status + ')'));
    }
    var json = await res.json();
    var text = json.text;
    if (!text) throw new Error('レスポンスが空でした');
    var updated = parseRecipeJson(text);
    if (!updated) throw new Error('調整結果の解析に失敗しました');
    // Keep version note: the previous recipe is saved in history already
    renderRecipe(updated, true);
    // Prepend a note
    var card = document.querySelector('#result .recipe');
    if (card) {
      var note = document.createElement('div');
      note.className = 'recipe-version-note';
      note.textContent = '🔧 「' + instruction + '」に基づいて調整しました（前バージョンは履歴に保存されています）';
      card.insertBefore(note, card.firstChild.nextSibling);
    }
  } catch (e) {
    if (e.name !== 'AbortError') alert('調整に失敗しました: ' + e.message);
  } finally {
    currentAbortController = null;
    if (goBtn) { goBtn.disabled = false; goBtn.textContent = '調整'; }
  }
}

// --- Streaming (single recipe only: hook into generateRecipe) ---
// We monkey-patch generateRecipe to try streaming first, fallback to existing on failure.
(function () {
  if (typeof generateRecipe !== 'function') return;
  var original = generateRecipe;
  window.generateRecipe = async function () {
    var resultEl = document.getElementById('result');
    var btn = document.getElementById('generate');
    if (currentAbortController) { currentAbortController.abort(); return; }
    currentAbortController = new AbortController();
    var mealBtn = document.getElementById('generate-meal');
    var weeklyBtn = document.getElementById('generate-weekly');
    btn.disabled = false;
    btn.textContent = 'キャンセル';
    btn.classList.add('cancel-state');
    btn.setAttribute('aria-busy', 'true');
    if (mealBtn) mealBtn.disabled = true;
    if (weeklyBtn) weeklyBtn.disabled = true;
    resultEl.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div>レシピを考えています...</div><div class="stream-preview" id="stream-preview" style="display:none;"></div></div></div>';

    try {
      var res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify({ prompt: buildPrompt(), stream: true }),
        signal: currentAbortController.signal,
      });
      if (!res.ok) {
        var errData = await res.json().catch(function () { return null; });
        throw new Error((errData && errData.error) || ('API エラー (' + res.status + ')'));
      }
      var ct = res.headers.get('content-type') || '';
      var fullText = '';
      if (ct.indexOf('text/event-stream') >= 0 && res.body) {
        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var preview = document.getElementById('stream-preview');
        if (preview) preview.style.display = 'block';
        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buffer += decoder.decode(chunk.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line.startsWith('data:')) continue;
            var data = line.slice(5).trim();
            if (data === '[DONE]') continue;
            try {
              var j = JSON.parse(data);
              var delta = j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content;
              if (delta) {
                fullText += delta;
                if (preview) {
                  preview.textContent = fullText.slice(-500);
                  preview.scrollTop = preview.scrollHeight;
                }
              }
            } catch { /* non-JSON data line */ }
          }
        }
      } else {
        // Fallback: plain JSON response
        var json = await res.json();
        fullText = json.text || '';
      }
      if (!fullText) throw new Error('レスポンスが空でした');
      var recipe = parseRecipeJson(fullText);
      if (!recipe) {
        resultEl.innerHTML = '<div class="card"><div class="error">レシピの生成に失敗しました。もう一度お試しください。<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>';
        return;
      }
      renderRecipe(recipe, true);
    } catch (e) {
      if (e.name === 'AbortError') {
        resultEl.innerHTML = '<div class="card"><div class="error">リクエストをキャンセルしました。</div></div>';
      } else {
        resultEl.innerHTML = '<div class="card"><div class="error">' + escapeHtml(e.message) + '<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>';
      }
    } finally {
      currentAbortController = null;
      btn.classList.remove('cancel-state');
      btn.disabled = false;
      btn.setAttribute('aria-busy', 'false');
      var mb = document.getElementById('generate-meal');
      if (mb) mb.disabled = false;
      var wb = document.getElementById('generate-weekly');
      if (wb) wb.disabled = false;
      updateButtonText();
    }
  };
})();

// Rebind generate button click to use streaming wrapper
(function () {
  var btn = document.getElementById('generate');
  if (!btn) return;
  var fresh = btn.cloneNode(true);
  btn.parentNode.replaceChild(fresh, btn);
  fresh.addEventListener('click', function () { window.generateRecipe(); });
})();
