<style>

  /* #14: Small smartphone (max-width: 480px) */

<body>
<div class="wrap">
  <header>
    <h1>🍳 レシピ提案AI</h1>
    <p>あなたにぴったりのレシピをAIが考えます</p>
  </header>

  <div class="card">
    <div class="field">
      <label for="craving">🍽 食べたいもの・料理のイメージ</label>
      <input type="text" id="craving" placeholder="例：さっぱりした和食" aria-label="食べたいもの・料理のイメージ">
    </div>
    <div class="field">
      <label for="ingredients">🥬 冷蔵庫にある食材</label>
      <textarea id="ingredients" placeholder="例：鶏肉、玉ねぎ、卵" aria-label="冷蔵庫にある食材"></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label for="servings">👥 人数</label>
        <input type="text" id="servings" placeholder="2人" aria-label="人数">
      </div>
      <div class="field">
        <label for="time">⏱ 調理時間</label>
        <input type="text" id="time" placeholder="30分以内" aria-label="調理時間">
      </div>
    </div>
    <div class="field">
      <label for="allergy">⚠️ 食の制限・アレルギー</label>
      <input type="text" id="allergy" placeholder="例：乳製品NG" aria-label="食の制限・アレルギー">
    </div>
    <div class="field">
      <label id="difficulty-label">📊 難易度</label>
      <div class="chips" id="difficulty" role="group" aria-labelledby="difficulty-label">
        <div class="chip" data-val="簡単" role="button" tabindex="0" aria-pressed="false">簡単</div>
        <div class="chip" data-val="普通" role="button" tabindex="0" aria-pressed="false">普通</div>
        <div class="chip" data-val="本格的" role="button" tabindex="0" aria-pressed="false">本格的</div>
      </div>
    </div>
    <div class="field">
      <label id="mood-label">✨ 気分・シーン</label>
      <div class="chips" id="mood" role="group" aria-labelledby="mood-label">
        <div class="chip" data-val="節約" role="button" tabindex="0" aria-pressed="false">節約</div>
        <div class="chip" data-val="ダイエット" role="button" tabindex="0" aria-pressed="false">ダイエット</div>
        <div class="chip" data-val="がっつり" role="button" tabindex="0" aria-pressed="false">がっつり</div>
        <div class="chip" data-val="おもてなし" role="button" tabindex="0" aria-pressed="false">おもてなし</div>
        <div class="chip" data-val="ヘルシー" role="button" tabindex="0" aria-pressed="false">ヘルシー</div>
      </div>
    </div>
    <button id="generate" aria-busy="false">おまかせでレシピを提案してもらう</button>
  </div>

  <!-- #15: aria-live for screen reader updates -->
  <div id="result" aria-live="polite"></div>
  <div id="favorites-container"></div>
  <div id="history-container"></div>
</div>

<script>
// #12: Service Worker registration (inline via Blob URL for single-file architecture)
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'recipe-ai-v1';
    const STATIC_ASSETS = ['/'];

    self.addEventListener('install', (event) => {
      event.waitUntil(
        caches.open(CACHE_NAME).then((cache) => cache.addAll(STATIC_ASSETS))
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', (event) => {
      event.waitUntil(
        caches.keys().then((keys) =>
          Promise.all(keys.filter((k) => k !== CACHE_NAME).map((k) => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', (event) => {
      const url = new URL(event.request.url);

      // Do not cache API requests
      if (url.origin !== self.location.origin) return;

      // Network First strategy
      event.respondWith(
        fetch(event.request)
          .then((response) => {
            const clone = response.clone();
            caches.open(CACHE_NAME).then((cache) => cache.put(event.request, clone));
            return response;
          })
          .catch(() => caches.match(event.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {
    // Service Worker registration failed silently (e.g., non-HTTPS context)
  });
}

// Workers API endpoint
const API_URL = 'https://recipe-api.kero-recipe.workers.dev';

// #13: AbortController for cancel functionality
let currentAbortController = null;

// --- #8: History management ---
const HISTORY_KEY = 'recipeHistory';
const HISTORY_MAX = 10;

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch {
    return [];
  }
}

function saveHistory(history) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch {
    // QuotaExceededError: silently ignore
  }
}

function addToHistory(recipe) {
  const history = loadHistory();
  const entry = {
    name: recipe.name || '名前なし',
    date: new Date().toLocaleString('ja-JP'),
    recipe: recipe,
  };
  history.unshift(entry);
  if (history.length > HISTORY_MAX) history.pop();
  saveHistory(history);
  renderHistory();
}

function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('history-container');
  const history = loadHistory();
  if (history.length === 0) {
    container.innerHTML = '';
    return;
  }
  const items = history.map((entry, idx) =>
    `<div class="history-item" data-idx="${idx}">
      <span class="history-name">${escapeHtml(entry.name)}</span>
      <span class="history-date">${escapeHtml(entry.date)}</span>
    </div>`
  ).join('');
  container.innerHTML = `
    <div class="card history-section">
      <div class="section-header">
        <h3>📋 履歴</h3>
        <button class="history-clear-btn" id="clear-history">履歴をクリア</button>
      </div>
      ${items}
    </div>
  `;
  document.getElementById('clear-history').addEventListener('click', clearHistory);
  container.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx, 10);
      const entry = loadHistory()[idx];
      if (entry && entry.recipe) {
        renderRecipe(entry.recipe, false);
      }
    });
  });
}

// --- Favorites management ---
const FAVORITES_KEY = 'recipe_favorites';
const FAVORITES_MAX = 50;

function loadFavorites() {
  try {
    return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];
  } catch {
    return [];
  }
}

function saveFavorites(favorites) {
  try {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      alert('ストレージの容量が不足しています。古いお気に入りを削除してください。');
    }
  }
}

function getFavoriteKey(recipe) {
  // Use recipe name as the unique key for matching
  return (recipe.name || '').trim();
}

function isFavorite(recipe) {
  const key = getFavoriteKey(recipe);
  if (!key) return false;
  const favorites = loadFavorites();
  return favorites.some(f => getFavoriteKey(f.recipe) === key);
}

function addFavorite(recipe) {
  const favorites = loadFavorites();
  if (favorites.length >= FAVORITES_MAX) {
    alert('お気に入りが上限（50件）に達しました。古いお気に入りを削除してから追加してください。');
    return false;
  }
  if (isFavorite(recipe)) return false;
  const entry = {
    id: 'fav_' + Date.now(),
    recipe: recipe,
    savedAt: new Date().toISOString(),
  };
  favorites.unshift(entry);
  saveFavorites(favorites);
  renderFavorites();
  return true;
}

function removeFavorite(recipe) {
  const key = getFavoriteKey(recipe);
  let favorites = loadFavorites();
  favorites = favorites.filter(f => getFavoriteKey(f.recipe) !== key);
  saveFavorites(favorites);
  renderFavorites();
}

function removeFavoriteById(id) {
  let favorites = loadFavorites();
  favorites = favorites.filter(f => f.id !== id);
  saveFavorites(favorites);
  renderFavorites();
}

function clearFavorites() {
  localStorage.removeItem(FAVORITES_KEY);
  renderFavorites();
}

function toggleFavorite(recipe) {
  if (isFavorite(recipe)) {
    removeFavorite(recipe);
    return false;
  } else {
    return addFavorite(recipe);
  }
}

function renderFavorites() {
  const container = document.getElementById('favorites-container');
  const favorites = loadFavorites();
  if (favorites.length === 0) {
    container.innerHTML = '';
    return;
  }
  const items = favorites.map(entry => {
    const savedDate = new Date(entry.savedAt).toLocaleString('ja-JP');
    const name = entry.recipe.name || '名前なし';
    return `<div class="fav-item" data-id="${escapeHtml(entry.id)}">
      <div class="fav-item-info" data-id="${escapeHtml(entry.id)}">
        <div class="fav-name">⭐ ${escapeHtml(name)}</div>
        <div class="fav-date">${escapeHtml(savedDate)}</div>
      </div>
      <button class="fav-delete-btn" data-id="${escapeHtml(entry.id)}">削除</button>
    </div>`;
  }).join('');
  container.innerHTML = `
    <div class="card favorites-section">
      <div class="section-header">
        <h3>⭐ お気に入り</h3>
        <button class="fav-clear-btn" id="clear-favorites">すべてクリア</button>
      </div>
      ${items}
    </div>
  `;
  document.getElementById('clear-favorites').addEventListener('click', () => {
    if (confirm('お気に入りをすべて削除しますか？')) {
      clearFavorites();
      updateFavButtonInResult();
    }
  });
  container.querySelectorAll('.fav-item-info').forEach(info => {
    info.addEventListener('click', () => {
      const id = info.dataset.id;
      const favorites = loadFavorites();
      const entry = favorites.find(f => f.id === id);
      if (entry && entry.recipe) {
        renderRecipe(entry.recipe, false);
      }
    });
  });
  container.querySelectorAll('.fav-delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      removeFavoriteById(id);
      updateFavButtonInResult();
    });
  });
}

// Update the favorite button in the currently displayed recipe card (if any)
function updateFavButtonInResult() {
  const favBtn = document.querySelector('#result .fav-btn');
  if (!favBtn || !favBtn._recipe) return;
  const faved = isFavorite(favBtn._recipe);
  favBtn.className = 'fav-btn ' + (faved ? 'faved' : 'not-faved');
  favBtn.textContent = faved ? '❤️ お気に入り済み' : '🤍 お気に入りに追加';
}

// #15: Chip toggle with aria-pressed update
function toggleChip(chip, group) {
  const wasActive = chip.classList.contains('active');
  group.querySelectorAll('.chip').forEach(c => {
    c.classList.remove('active');
    c.setAttribute('aria-pressed', 'false');
  });
  if (!wasActive) {
    chip.classList.add('active');
    chip.setAttribute('aria-pressed', 'true');
  }
  updateButtonText();
}

// Chip selection (single select) with keyboard support (#15)
function setupChips(groupId) {
  const group = document.getElementById(groupId);
  group.addEventListener('click', (e) => {
    if (!e.target.classList.contains('chip')) return;
    toggleChip(e.target, group);
  });
  // #15: Keyboard support for chips (Enter / Space)
  group.addEventListener('keydown', (e) => {
    if (!e.target.classList.contains('chip')) return;
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleChip(e.target, group);
    }
  });
}
setupChips('difficulty');
setupChips('mood');

function getChipValue(groupId) {
  const active = document.querySelector(`#${groupId} .chip.active`);
  return active ? active.dataset.val : '';
}

// --- #7: Dynamic button text based on input ---
function hasAnyInput() {
  if (document.getElementById('craving').value.trim()) return true;
  if (document.getElementById('ingredients').value.trim()) return true;
  if (document.getElementById('servings').value.trim()) return true;
  if (document.getElementById('time').value.trim()) return true;
  if (document.getElementById('allergy').value.trim()) return true;
  if (getChipValue('difficulty')) return true;
  if (getChipValue('mood')) return true;
  return false;
}

function updateButtonText() {
  const btn = document.getElementById('generate');
  if (btn.disabled && !btn.classList.contains('cancel-state')) return;
  if (btn.classList.contains('cancel-state')) return;
  btn.textContent = hasAnyInput()
    ? 'レシピを提案してもらう'
    : 'おまかせでレシピを提案してもらう';
}

// Attach input listeners for button text update
['craving', 'ingredients', 'servings', 'time', 'allergy'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateButtonText);
});

function buildPrompt() {
  const data = {
    食べたいもの: document.getElementById('craving').value.trim(),
    冷蔵庫の食材: document.getElementById('ingredients').value.trim(),
    人数: document.getElementById('servings').value.trim(),
    調理時間: document.getElementById('time').value.trim(),
    アレルギー制限: document.getElementById('allergy').value.trim(),
    難易度: getChipValue('difficulty'),
    気分シーン: getChipValue('mood'),
  };
  const filled = Object.entries(data)
    .filter(([, v]) => v)
    .map(([k, v]) => `- ${k}: ${v}`)
    .join('\n');

  return `あなたは料理研究家です。以下の条件からレシピを1つ提案してください。
${filled || '- 特に指定なし。おすすめの家庭料理を提案してください。'}

必ず以下のJSON形式のみで回答してください（前後に説明文を付けない）:
{
  "name": "料理名",
  "time": "調理時間（例: 30分）",
  "difficulty": "難易度",
  "cost": "目安費用（円）",
  "ingredients": [{"name": "食材名", "amount": "分量"}],
  "steps": ["手順1", "手順2"],
  "nutrition": {"calories": "kcal", "protein": "g", "carbs": "g", "fat": "g", "salt": "g"},
  "tips": "料理のポイント・アレンジ"
}`;
}

// #9: Robust JSON parsing - try direct parse first, then regex extraction
function parseRecipeJson(text) {
  // First, try parsing the entire text directly
  try {
    return JSON.parse(text);
  } catch {
    // Fall through to regex extraction
  }
  // Extract JSON object from text using regex
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) return null;
  try {
    return JSON.parse(jsonMatch[0]);
  } catch {
    return null;
  }
}

async function generateRecipe() {
  const resultEl = document.getElementById('result');
  const btn = document.getElementById('generate');

  // #13: If currently loading, cancel the request
  if (currentAbortController) {
    currentAbortController.abort();
    return;
  }

  // #13: Create AbortController for this request
  currentAbortController = new AbortController();

  btn.disabled = false;
  btn.textContent = 'キャンセル';
  btn.classList.add('cancel-state');
  btn.setAttribute('aria-busy', 'true');
  resultEl.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div>レシピを考えています...</div></div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: buildPrompt() }),
      signal: currentAbortController.signal,
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => null);
      const errMsg = errData?.error || `API エラー (${res.status})`;
      throw new Error(errMsg);
    }

    const json = await res.json();
    const text = json.text;
    if (!text) throw new Error('レスポンスが空でした');

    // #9: Use robust JSON parser
    const recipe = parseRecipeJson(text);
    // #6: Show retry button on JSON parse failure
    if (!recipe) {
      resultEl.innerHTML = `<div class="card"><div class="error">レシピの生成に失敗しました。もう一度お試しください。<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>`;
      return;
    }
    renderRecipe(recipe, true);
  } catch (e) {
    // #13: Handle abort (cancel)
    if (e.name === 'AbortError') {
      resultEl.innerHTML = '<div class="card"><div class="error">リクエストをキャンセルしました。</div></div>';
    } else {
      // #6: Show retry button on error
      resultEl.innerHTML = `<div class="card"><div class="error">${escapeHtml(e.message)}<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>`;
    }
  } finally {
    currentAbortController = null;
    btn.classList.remove('cancel-state');
    btn.disabled = false;
    btn.setAttribute('aria-busy', 'false');
    updateButtonText();
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderRecipe(r, addHistory) {
  const ingredients = (r.ingredients || []).map(i =>
    `<li><span>${escapeHtml(i.name)}</span><span>${escapeHtml(i.amount)}</span></li>`
  ).join('');
  const steps = (r.steps || []).map(s => `<li>${escapeHtml(s)}</li>`).join('');
  const n = r.nutrition || {};

  const faved = isFavorite(r);
  const favBtnClass = faved ? 'fav-btn faved' : 'fav-btn not-faved';
  const favBtnText = faved ? '❤️ お気に入り済み' : '🤍 お気に入りに追加';

  document.getElementById('result').innerHTML = `
    <div class="card recipe">
      <h2>${escapeHtml(r.name || '')}${faved ? ' ⭐' : ''}</h2>
      <button class="${favBtnClass}" id="fav-toggle">${favBtnText}</button>
      <div class="meta">
        <span>⏱ ${escapeHtml(r.time || '-')}</span>
        <span>📊 ${escapeHtml(r.difficulty || '-')}</span>
        <span>💰 ${escapeHtml(r.cost || '-')}</span>
      </div>
      <div class="section-title">食材</div>
      <ul class="ing">${ingredients}</ul>
      <div class="section-title">作り方</div>
      <ol class="steps">${steps}</ol>
      <div class="section-title">栄養素</div>
      <div class="nutri">
        <div><div class="label">カロリー</div><div class="val">${escapeHtml(n.calories || '-')}</div></div>
        <div><div class="label">たんぱく質</div><div class="val">${escapeHtml(n.protein || '-')}</div></div>
        <div><div class="label">炭水化物</div><div class="val">${escapeHtml(n.carbs || '-')}</div></div>
        <div><div class="label">脂質</div><div class="val">${escapeHtml(n.fat || '-')}</div></div>
        <div><div class="label">塩分</div><div class="val">${escapeHtml(n.salt || '-')}</div></div>
      </div>
      <div class="section-title">ポイント・アレンジ</div>
      <div class="tip">${escapeHtml(r.tips || '')}</div>
    </div>
  `;

  // Attach favorite toggle handler
  const favBtn = document.getElementById('fav-toggle');
  favBtn._recipe = r;
  favBtn.addEventListener('click', () => {
    const nowFaved = isFavorite(r);
    if (nowFaved) {
      removeFavorite(r);
    } else {
      addFavorite(r);
    }
    // Update button state
    const newFaved = isFavorite(r);
    favBtn.className = 'fav-btn ' + (newFaved ? 'faved' : 'not-faved');
    favBtn.textContent = newFaved ? '❤️ お気に入り済み' : '🤍 お気に入りに追加';
    // Update h2 star mark
    const h2 = document.querySelector('#result .recipe h2');
    if (h2) {
      const baseName = escapeHtml(r.name || '');
      h2.innerHTML = baseName + (newFaved ? ' ⭐' : '');
    }
  });

  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });

  // #8: Save to history (only for new recipes, not history re-display)
  if (addHistory !== false) {
    addToHistory(r);
  }
}

document.getElementById('generate').addEventListener('click', generateRecipe);

// Initialize favorites and history on load
renderFavorites();
renderHistory();
</script>
