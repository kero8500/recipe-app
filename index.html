// --- Per-step AI image (pollinations.ai) ---
function _hashStrToSeed(str) {
  var seed = 0;
  for (var i = 0; i < str.length; i++) { seed = ((seed << 5) - seed + str.charCodeAt(i)) | 0; }
  return Math.abs(seed) % 1000000;
}
function buildStepImagePrompt(recipeName, stepIndex, stepText, ingredientNames) {
  var name = recipeName || 'Japanese home dish';
  var text = (stepText || '').slice(0, 80);
  var hint = '';
  if (Array.isArray(ingredientNames) && ingredientNames.length) {
    hint = ' (ingredients: ' + ingredientNames.slice(0, 4).join(', ') + ')';
  }
  return name + hint + ', step ' + (stepIndex + 1) + ': ' + text +
    ', Japanese home cooking process, realistic food photography, overhead view, natural daylight, appetizing, high detail';
}
function buildStepImageUrl(recipeName, stepIndex, stepText, ingredientNames) {
  var prompt = buildStepImagePrompt(recipeName, stepIndex, stepText, ingredientNames);
  var seedKey = (recipeName || '') + '|' + stepIndex + '|' + (stepText || '').slice(0, 32);
  var seed = _hashStrToSeed(seedKey);
  return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) +
    '?width=512&height=384&seed=' + seed + '&nologo=true&model=flux';
}
function buildStepLiHtml(recipeName, stepIndex, stepText, ingredientNames) {
  // Normal recipe display: text only (images appear only in cooking mode).
  return '<li>' + escapeHtml(stepText || '') + '</li>';
}

// --- AI food image generation (pollinations.ai, free, no-auth) ---
function buildFoodImagePrompt(recipe) {
  var name = (recipe && recipe.name) || 'Japanese home-cooked dish';
  // Include a few key ingredients as hints to improve fidelity
  var ings = [];
  if (Array.isArray(recipe.ingredients)) {
    ings = recipe.ingredients.slice(0, 5).map(function (i) { return i.name; }).filter(Boolean);
  }
  var hints = ings.length ? (' with ' + ings.join(', ')) : '';
  return name + hints +
    ', Japanese home cooking, realistic food photography, shot from above, natural daylight, on a ceramic plate, appetizing, high detail, 8k';
}
function generateFoodImage(recipe) {
  var box = document.getElementById('recipe-image-box');
  if (!box) return;
  var btn = document.getElementById('gen-image-btn');
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }
  box.innerHTML = '<div class="img-loading"><div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:8px;"></div>完成イメージを生成しています...</div>';
  var prompt = buildFoodImagePrompt(recipe);
  // Deterministic seed so same recipe yields same image (browser cache friendly)
  var seed = 0;
  for (var i = 0; i < prompt.length; i++) { seed = ((seed << 5) - seed + prompt.charCodeAt(i)) | 0; }
  seed = Math.abs(seed) % 1000000;
  var url = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) +
    '?width=768&height=512&seed=' + seed + '&nologo=true&model=flux';
  var img = new Image();
  img.alt = recipe.name || 'AI generated food image';
  img.onload = function () {
    box.innerHTML = '';
    box.appendChild(img);
    var note = document.createElement('div');
    note.className = 'recipe-image-note';
    note.textContent = '※ AIによる参考画像です（pollinations.ai・無料）';
    box.appendChild(note);
    var regen = document.createElement('button');
    regen.className = 'recipe-image-btn';
    regen.type = 'button';
    regen.id = 'gen-image-btn';
    regen.textContent = '🔁 別のイメージを生成';
    regen.style.marginTop = '6px';
    regen.addEventListener('click', function () {
      // Use a fresh random seed to get a different image
      var nurl = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) +
        '?width=768&height=512&seed=' + Math.floor(Math.random() * 1000000) + '&nologo=true&model=flux';
      box.innerHTML = '<div class="img-loading"><div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:8px;"></div>生成中...</div>';
      var ni = new Image();
      ni.alt = img.alt;
      ni.onload = function () { box.innerHTML = ''; box.appendChild(ni); box.appendChild(note); box.appendChild(regen); };
      ni.onerror = function () { box.innerHTML = '<div style="color:#c00;font-size:12px;">画像生成に失敗しました。しばらく待ってから再試行してください。</div>'; };
      ni.src = nurl;
    });
    box.appendChild(regen);
  };
  img.onerror = function () {
    box.innerHTML = '<button class="recipe-image-btn" id="gen-image-btn" type="button">🎨 完成イメージをAIで生成</button>' +
      '<div class="recipe-image-note" style="color:#c00;">画像生成に失敗しました。再度お試しください。</div>';
  };
  img.src = url;
}

  currentAbortController = new AbortController();
  if (goBtn) { goBtn.disabled = true; goBtn.textContent = '調整中...'; }

  try {
    var prompt = 'あなたは料理研究家です。以下の既存レシピを、ユーザーの指示に従って調整し、更新後のレシピをJSONで返してください。料理名・分量・手順・栄養素・ポイントを整合するよう見直してください。\n' +

      '【調整指示】\n' + instruction + '\n\n' +

      '{\n' +
      '  "name": "料理名",\n' +
      '  "time": "調理時間",\n' +
      '  "difficulty": "難易度",\n' +
      '  "cost": "目安費用（円）",\n' +
      '  "ingredients": [{"name": "食材名", "amount": "分量"}],\n' +
      '  "steps": ["手順1", "手順2"],\n' +
      '  "nutrition": {"calories": "kcal", "protein": "g", "carbs": "g", "fat": "g", "salt": "g"},\n' +
      '  "tips": "料理のポイント・アレンジ"\n' +
      '}';
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt }),
      signal: currentAbortController.signal,
    });
    if (!res.ok) {
      var errData = await res.json().catch(function () { return null; });
      throw new Error((errData && errData.error) || ('API エラー (' + res.status + ')'));
    }
    var json = await res.json();
    var text = json.text;
    if (!text) throw new Error('レスポンスが空でした');
    var updated = parseRecipeJson(text);
    if (!updated) throw new Error('調整結果の解析に失敗しました');

    renderRecipe(updated, true);

      card.insertBefore(note, card.firstChild.nextSibling);
    }
  } catch (e) {
    if (e.name !== 'AbortError') alert('調整に失敗しました: ' + e.message);
  } finally {
    currentAbortController = null;
    if (goBtn) { goBtn.disabled = false; goBtn.textContent = '調整'; }
  }
}

        }

      if (typeof snackbarCurrent.onAction === 'function') {

      }

    };
  };

  // ---- Swipe helper ----
  // attachSwipe(el, { onLeft, onRight, threshold:60, leftHint:'削除', rightHint:'完了' })
  window.attachSwipe = function (el, opts) {

    }
    if (opts.rightHint || opts.onRight) {
      var bgR = document.createElement('div');
      bgR.className = 'swipe-bg right';
      bgR.textContent = opts.rightHint || '✓ 完了';
      el.appendChild(bgR);
    }
    var startX = 0, startY = 0, dx = 0, dy = 0, tracking = false, decided = null;

    el.addEventListener('touchstart', function (e) {
      if (e.touches.length !== 1) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      dx = 0; dy = 0; tracking = true; decided = null;
      el.classList.add('swiping');
      el.classList.remove('swipe-reset');
    }, { passive: true });

    el.addEventListener('touchmove', function (e) {
      if (!tracking) return;
      dx = e.touches[0].clientX - startX;
      dy = e.touches[0].clientY - startY;
      if (decided === null) {
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
          // decide direction (horiz vs vert) once
          decided = (Math.abs(dx) > Math.abs(dy) * 1.2) ? 'h' : 'v';
        }
      }
      if (decided === 'h') {
        if (e.cancelable) e.preventDefault();
        el.style.transform = 'translateX(' + dx + 'px)';
        el.classList.toggle('show-left-bg', dx < -10);
        el.classList.toggle('show-right-bg', dx > 10);
      }
    }, { passive: false });

    el.addEventListener('touchend', function () {
      if (!tracking) return;
      tracking = false;
      el.classList.remove('swiping');
      if (decided === 'h' && Math.abs(dx) >= threshold) {
        if (dx < 0 && typeof opts.onLeft === 'function') {
          window.hapticTap(15);
          el.classList.add('swipe-out-left');
          setTimeout(function () { opts.onLeft(el); }, 220);
          return;
        }
        if (dx > 0 && typeof opts.onRight === 'function') {
          window.hapticTap(15);
          if (opts.rightOutAnim !== false) {
            el.classList.add('swipe-out-right');
            setTimeout(function () { opts.onRight(el); }, 220);
          } else {
            el.style.transform = '';
            el.classList.remove('show-left-bg', 'show-right-bg');
            opts.onRight(el);
          }
          return;
        }
      }
      // snap back
      el.classList.add('swipe-reset');
      el.style.transform = '';
      el.classList.remove('show-left-bg');
      el.classList.remove('show-right-bg');
    });

    el.addEventListener('touchcancel', function () {
      tracking = false;
      el.classList.add('swipe-reset');
      el.style.transform = '';
      el.classList.remove('show-left-bg');
      el.classList.remove('show-right-bg');
    });
  };

  // Helper to reset swipe state on a card (used when delete is cancelled)
  window.resetSwipeState = function (el) {
    if (!el) return;
    el.classList.remove('swipe-out-left', 'swipe-out-right', 'swiping', 'show-left-bg', 'show-right-bg');
    el.classList.add('swipe-reset');
    el.style.transform = '';
    el.style.opacity = '';
  };
})();

/* === Phase 1: Voice input === */
(function () {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.querySelectorAll('.voice-input-btn').forEach(function (b) { b.style.display = 'none'; });
    return;
  }
  function normalizeIngredients(raw) {
    if (!raw) return '';
    return raw
      .replace(/[、,]/g, '、')
      .replace(/[と や]/g, '、')
      .replace(/。+$/, '')
      .replace(/\s+/g, '')
      .replace(/、+/g, '、')
      .replace(/^、|、$/g, '');
  }
  window.startVoiceInput = function (targetId, btn) {
    var target = document.getElementById(targetId);
    if (!target) return;
    if (btn._recognizing) {
      try { btn._rec.stop(); } catch (_) {}
      return;
    }
    var rec = new SR();
    rec.lang = 'ja-JP';
    rec.interimResults = false;
    rec.continuous = false;
    rec.maxAlternatives = 1;
    btn._rec = rec;
    btn._recognizing = true;
    btn.classList.add('recording');
    btn.textContent = '●';
    rec.onresult = function (ev) {
      try {
        var text = ev.results[0][0].transcript || '';
        var norm = normalizeIngredients(text);
        if (!norm) return;
        if (target.tagName === 'TEXTAREA' || target.type === 'text') {
          var cur = target.value.trim();
          target.value = cur ? (cur.replace(/[、,]\s*$/, '') + '、' + norm) : norm;
          target.dispatchEvent(new Event('input', { bubbles: true }));
        }
      } catch (_) {}
    };
    rec.onerror = function (ev) {
      var msg = '音声認識でエラーが発生しました';
      if (ev && ev.error === 'not-allowed') msg = 'マイクの使用が許可されていません';
      else if (ev && ev.error === 'no-speech') msg = '音声が聞こえませんでした';
      if (window.showSnackbar) window.showSnackbar(msg);
    };
    rec.onend = function () {
      btn._recognizing = false;
      btn._rec = null;
      btn.classList.remove('recording');
      btn.textContent = '🎤';
    };
    try { rec.start(); } catch (_) {
      btn._recognizing = false;
      btn.classList.remove('recording');
      btn.textContent = '🎤';
    }
  };
  document.addEventListener('click', function (e) {
    var btn = e.target.closest && e.target.closest('.voice-input-btn');
    if (!btn) return;
    e.preventDefault();
    var t = btn.getAttribute('data-voice-target');
    if (t) window.startVoiceInput(t, btn);
  });

  // Inject voice button for fridge-name (if not present)
  var fridgeName = document.getElementById('fridge-name');
  if (fridgeName && !document.querySelector('.voice-input-btn[data-voice-target="fridge-name"]')) {
    var mic = document.createElement('button');
    mic.type = 'button';
    mic.className = 'voice-input-btn';
    mic.setAttribute('data-voice-target', 'fridge-name');
    mic.setAttribute('aria-label', '音声で食材名を入力');
    mic.textContent = '🎤';
    mic.style.width = '40px'; mic.style.height = '40px';
    mic.style.minWidth = '40px'; mic.style.minHeight = '40px';
    mic.style.fontSize = '15px';
    // Place it as a sibling cell in the grid by wrapping name+mic
    var parent = fridgeName.parentNode;
    var holder = document.createElement('span');
    holder.style.position = 'relative';
    holder.style.display = 'block';
    parent.replaceChild(holder, fridgeName);
    holder.appendChild(fridgeName);
    fridgeName.style.paddingRight = '44px';
    mic.style.position = 'absolute';
    mic.style.top = '50%';
    mic.style.right = '4px';
    mic.style.transform = 'translateY(-50%)';
    holder.appendChild(mic);
  }
})();

  function autoTagsForRecipe(recipe) {

  // ===== 履歴モーダル制御 =====

            window.showDeleteConfirm(name, function () {
              var freshList = loadHistory();

              var targetIdx = -1;
              for (var i = 0; i < freshList.length; i++) {
                if (freshList[i].name === entry.name && freshList[i].date === entry.date) {
                  targetIdx = i; break;

  function openTagPicker(favId) {

    document.body.appendChild(overlay);

        if (v && current.indexOf(v) === -1) current.push(v);

    });
    overlay.querySelector('.tag-cancel').addEventListener('click', function () { overlay.remove(); });
    overlay.querySelector('.tag-save').addEventListener('click', function () {
      // Also include typed but not-Enter'd tag
      var v = inp.value.trim();

      overlay.remove();
      window.renderFavorites();
    });
    overlay.addEventListener('click', function (e) { if (e.target === overlay) overlay.remove(); });
  }

  // Initial re-render
  try { window.renderShoppingList(); } catch (_) {}
  try { window.renderFavorites(); } catch (_) {}
})();


/* === Phase 3: Tinder-style candidate swipe & cooking mode enhance === */
(function () {
  function htmlEscape(s) { return (s == null ? '' : String(s)).replace(/[&<>"']/g, function (c) { return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]; }); }
  var HINTS_KEY = 'recipeCandidateHintsShown';

  var origRenderCandidates = window.renderCandidates;
  // [DISABLED] Tinder-style swipe stack for candidates removed. Falling back to original list UI.
  var __CAND_SWIPE_DISABLED__ = true;
  window.renderCandidates = function (candidates, type) {
    if (__CAND_SWIPE_DISABLED__ && typeof origRenderCandidates === 'function') {
      return origRenderCandidates(candidates, type);
    }
    var resultEl = document.getElementById('result');
    if (!resultEl || !Array.isArray(candidates) || candidates.length === 0) return;
    var title = type === 'meal' ? '🍱 献立の候補3つ' : '🍳 レシピの候補3つ';
    var order = candidates.map(function (_, i) { return i; });
    var position = 0;
    var rejected = {};
    var hintsShown = false;
    try { hintsShown = localStorage.getItem(HINTS_KEY) === '1'; } catch (_) {}

    function cardHtml(c, idx, pos) {
      var name = c.name || (type === 'meal' ? '献立' + (idx + 1) : 'レシピ' + (idx + 1));
      var time = type === 'meal' ? (c.totalTime || c.time || '-') : (c.time || '-');
      var difficulty = c.difficulty || '-';
      var cost = c.cost || '-';
      var summary = c.summary || '';
      var posClass = pos === 0 ? 'top' : (pos === 1 ? 'mid' : 'back');
      return '<div class="cand-swipe-card ' + posClass + '" data-idx="' + idx + '">'
        + '<div class="cc-overlay-label like">決定</div>'
        + '<div class="cc-overlay-label nope">次へ</div>'
        + '<div class="cc-overlay-label up">⭐ お気に入り</div>'
        + '<div class="cc-overlay-label down">却下</div>'
        + '<div class="cc-num">' + (idx + 1) + ' / ' + candidates.length + '</div>'
        + '<div class="cc-name">' + (type === 'meal' ? '🍱 ' : '') + htmlEscape(name) + '</div>'
        + '<div class="cc-meta">'
          + '<span>⏱ ' + htmlEscape(time) + '</span>'
          + '<span>📊 ' + htmlEscape(difficulty) + '</span>'
          + '<span>💰 ' + htmlEscape(cost) + '</span>'
        + '</div>'
        + (summary ? '<div class="cc-summary">' + htmlEscape(summary) + '</div>' : '<div class="cc-summary"></div>')
        + '<div class="cc-actions">'
          + '<button type="button" class="cc-skip">⏭ 次の候補</button>'
          + '<button type="button" class="cc-decide">✓ これに決定</button>'
        + '</div>'
      + '</div>';
    }

    function render() {
      var topIdx = order[position];
      var midIdx = order[(position + 1) % order.length];
      var backIdx = order[(position + 2) % order.length];
      var seen = {};
      var cards = [];
      [topIdx, midIdx, backIdx].forEach(function (i, p) {
        if (seen[i]) return;
        seen[i] = true;
        cards.push(cardHtml(candidates[i], i, p));
      });
      var dotsHtml = '<div class="cand-dots">' + candidates.map(function (_, i) {
        return '<span class="' + (i === order[position] ? 'active' : '') + '"></span>';
      }).join('') + '</div>';
      var hintsHtml = '';
      if (!hintsShown) {
        hintsHtml = '<div class="cand-hints" id="cand-hints">'
          + '👉 右=決定、👈 左=次へ、👆 上=お気に入り、👇 下=却下'
          + '<button class="hint-close" type="button" id="cand-hints-close">閉じる</button>'
          + '</div>';
      }
      resultEl.innerHTML = '<div class="card">'
        + '<div class="candidates-intro">' + htmlEscape(title) + '。スワイプまたはボタンで選択。</div>'
        + hintsHtml
        + dotsHtml
        + '<div class="cand-stack" id="cand-stack">' + cards.reverse().join('') + '</div>'
        + '<button class="candidates-cancel" id="candidates-cancel">キャンセル</button>'
      + '</div>';

      var hintsEl = document.getElementById('cand-hints-close');
      if (hintsEl) hintsEl.addEventListener('click', function () {
        hintsShown = true;
        try { localStorage.setItem(HINTS_KEY, '1'); } catch (_) {}
        var box = document.getElementById('cand-hints');
        if (box) box.remove();
      });

      var cancelBtn = document.getElementById('candidates-cancel');
      if (cancelBtn) cancelBtn.addEventListener('click', function () { resultEl.innerHTML = ''; });

      var stack = document.getElementById('cand-stack');
      var topCard = stack.querySelector('.cand-swipe-card.top');
      if (!topCard) return;

      // Buttons
      topCard.querySelector('.cc-decide').addEventListener('click', function () { decide(); });
      topCard.querySelector('.cc-skip').addEventListener('click', function () { skip(); });

      // Swipe gestures
      var sx = 0, sy = 0, dx = 0, dy = 0, tracking = false, decided = null;
      topCard.addEventListener('touchstart', function (e) {
        if (e.touches.length !== 1) return;
        sx = e.touches[0].clientX; sy = e.touches[0].clientY;
        dx = 0; dy = 0; tracking = true; decided = null;
        topCard.style.transition = 'none';
      }, { passive: true });
      topCard.addEventListener('touchmove', function (e) {
        if (!tracking) return;
        dx = e.touches[0].clientX - sx;
        dy = e.touches[0].clientY - sy;
        if (decided === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
          decided = (Math.abs(dx) > Math.abs(dy)) ? 'h' : 'v';
        }
        if (e.cancelable) e.preventDefault();
        var rot = dx / 20;
        topCard.style.transform = 'translate(' + dx + 'px, ' + dy + 'px) rotate(' + rot + 'deg)';
        // Overlay labels
        var like = topCard.querySelector('.cc-overlay-label.like');
        var nope = topCard.querySelector('.cc-overlay-label.nope');
        var up   = topCard.querySelector('.cc-overlay-label.up');
        var down = topCard.querySelector('.cc-overlay-label.down');
        if (decided === 'h') {
          like.style.opacity = dx > 0 ? Math.min(1, dx / 120) : 0;
          nope.style.opacity = dx < 0 ? Math.min(1, -dx / 120) : 0;
          up.style.opacity = 0; down.style.opacity = 0;
        } else if (decided === 'v') {
          up.style.opacity = dy < 0 ? Math.min(1, -dy / 120) : 0;
          down.style.opacity = dy > 0 ? Math.min(1, dy / 120) : 0;
          like.style.opacity = 0; nope.style.opacity = 0;
        }
      }, { passive: false });
      topCard.addEventListener('touchend', function () {
        if (!tracking) return;
        tracking = false;
        topCard.style.transition = '';
        var absX = Math.abs(dx), absY = Math.abs(dy);
        var TH = 80;
        if (decided === 'h' && absX > TH) {
          if (dx > 0) fly('right', decide);
          else fly('left', skip);
        } else if (decided === 'v' && absY > TH) {
          if (dy < 0) fly('up', favorite);
          else fly('down', reject);
        } else {
          topCard.style.transform = '';
          topCard.querySelectorAll('.cc-overlay-label').forEach(function (l) { l.style.opacity = 0; });
        }
      });
      topCard.addEventListener('touchcancel', function () {
        tracking = false;
        topCard.style.transform = '';
      });

      function fly(dir, cb) {
        window.hapticTap && window.hapticTap(18);
        var tx = 0, ty = 0, rot = 0;
        if (dir === 'right') { tx = window.innerWidth; rot = 20; }
        else if (dir === 'left') { tx = -window.innerWidth; rot = -20; }
        else if (dir === 'up') { ty = -window.innerHeight; }
        else if (dir === 'down') { ty = window.innerHeight; }
        topCard.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
        topCard.style.transform = 'translate(' + tx + 'px,' + ty + 'px) rotate(' + rot + 'deg)';
        topCard.style.opacity = '0';
        setTimeout(cb, 280);
      }
    }

    function decide() {
      var idx = order[position];
      var chosen = candidates[idx];
      if (!chosen) return;
      if (type === 'meal') {
        if (!chosen.type) chosen.type = 'meal';
        renderMeal(chosen, true);
      } else {
        renderRecipe(chosen, true);
      }
    }
    function skip() {
      window.hapticTap && window.hapticTap(10);
      position = (position + 1) % order.length;
      render();
    }
    function favorite() {
      var idx = order[position];
      var chosen = candidates[idx];
      if (chosen && typeof addFavorite === 'function') {
        try { addFavorite(chosen); } catch (_) {}
      }
      skip();
    }
    function reject() {
      var idx = order[position];
      rejected[idx] = true;
      // Remove from order
      order = order.filter(function (i) { return i !== idx; });
      if (order.length === 0) {
        resultEl.innerHTML = '<div class="card"><div class="candidates-intro">すべての候補を却下しました。もう一度生成してください。</div><button class="candidates-cancel" id="candidates-cancel">閉じる</button></div>';
        var cc = document.getElementById('candidates-cancel');
        if (cc) cc.addEventListener('click', function () { resultEl.innerHTML = ''; });
        return;
      }
      position = position % order.length;
      render();
    }

    render();
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  // --- Cooking mode enhancement: add haptic to existing swipe + visual hint ---
  // openCookingMode is a closure; we wrap by monkey-patching via interception.
  var origOpen = window.openCookingMode;
  if (typeof origOpen === 'function') {
    window.openCookingMode = function (recipe) {
      origOpen.call(this, recipe);
      var overlay = document.querySelector('.cooking-overlay');
      if (!overlay) return;
      // Add haptic on existing nav buttons
      ['cook-prev', 'cook-next'].forEach(function (id) {
        var b = overlay.querySelector('#' + id);
        if (b) b.addEventListener('click', function () { window.hapticTap && window.hapticTap(15); });
      });
      // Swipe feedback (visual) by hooking touch events on body
      var fbL = document.createElement('div');
      fbL.className = 'swipe-feedback left';
      fbL.textContent = '◀ 前';
      var fbR = document.createElement('div');
      fbR.className = 'swipe-feedback right';
      fbR.textContent = '次 ▶';
      var block = overlay.querySelector('.cooking-step-block');
      if (block) { block.appendChild(fbL); block.appendChild(fbR); }

      // Augment existing swipe with lower threshold and haptic (add second listener)
      var sx = null, sy = null;
      overlay.addEventListener('touchstart', function (e) {
        sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      }, { passive: true });
      overlay.addEventListener('touchmove', function (e) {
        if (sx === null) return;
        var dx = e.touches[0].clientX - sx;
        var dy = e.touches[0].clientY - sy;
        if (Math.abs(dx) > 20 && Math.abs(dx) > Math.abs(dy)) {
          fbL.classList.toggle('show', dx > 30);
          fbR.classList.toggle('show', dx < -30);
        } else {
          fbL.classList.remove('show'); fbR.classList.remove('show');
        }
      }, { passive: true });
      overlay.addEventListener('touchend', function () {
        sx = null; sy = null;
        fbL.classList.remove('show'); fbR.classList.remove('show');
        window.hapticTap && window.hapticTap(12);
      });
    };
  }
})();


/* ============================================================
 * === Phase A: Bottom tab navigation + toast helper + skeleton
 * ============================================================ */
(function () {
  'use strict';

  // ---- Bottom tab navigation ----
  var tabbar = document.querySelector('.bottom-tabbar');
  if (!tabbar) return;

  // 各タブに対応する表示要素グループを定義
  // ホーム = top-menu + panel-recipe + panel-remix + result
  // 冷蔵庫 = panel-fridge
  // 買い物 = shopping-container
  // お気に入り = favorites-container + history-container
  // 設定 = 設定モーダルを開く（タブのactive切替は行わない）
  var TAB_GROUPS = {
    home: ['.top-menu', '#panel-recipe', '#panel-remix', '#result'],
    fridge: ['#panel-fridge'],
    shopping: ['#shopping-container'],
    favorites: ['#favorites-container'],
  };

  // お気に入りタブや買い物タブでも空の時でも見栄えが良いよう、空時メッセージを表示する
  function ensureEmptyHint(containerId, emptyHtml) {
    var el = document.getElementById(containerId);
    if (!el) return;
    if (!el.innerHTML.trim()) {
      el.innerHTML = emptyHtml;
    }
  }

  function hideAll() {
    Object.keys(TAB_GROUPS).forEach(function (key) {
      TAB_GROUPS[key].forEach(function (sel) {
        document.querySelectorAll(sel).forEach(function (el) {
          el.setAttribute('data-tab-hidden', 'true');
          el.style.display = 'none';
        });
      });
    });
  }

  function showGroup(key) {
    var sels = TAB_GROUPS[key] || [];
    sels.forEach(function (sel) {
      document.querySelectorAll(sel).forEach(function (el) {
        el.removeAttribute('data-tab-hidden');
        el.style.display = '';
      });
    });
    // #panel-fridge は単独で表示するため .active クラスを付与（.panel のCSS: display:none 対応）
    // panel-recipe / panel-remix はホーム内の top-menu サブ切替で管理されるため、ここでは触らない
    if (key === 'fridge') {
      var fr = document.getElementById('panel-fridge');
      if (fr) fr.classList.add('active');
    } else {
      var fr2 = document.getElementById('panel-fridge');
      if (fr2) fr2.classList.remove('active');
    }
  }

  function activateTab(tabName) {
    if (tabName === 'settings') {
      // 設定は overlay を開くだけ。タブの active は元のまま維持
      var openBtn = document.getElementById('open-settings');
      if (openBtn) openBtn.click();
      else {
        var overlay = document.getElementById('settings-overlay');
        if (overlay) overlay.classList.add('active');
      }
      return;
    }

    hideAll();
    showGroup(tabName);

    tabbar.querySelectorAll('.tab').forEach(function (b) {
      var active = b.dataset.tab === tabName;
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    });

    if (tabName === 'fridge' && typeof window.renderFridge === 'function') {
      try { window.renderFridge(); } catch (_) {}
    }
    if (tabName === 'favorites' && typeof window.renderFavorites === 'function') {
      try { window.renderFavorites(); } catch (_) {}
    }
    if (tabName === 'shopping' && typeof window.renderShoppingList === 'function') {
      try { window.renderShoppingList(); } catch (_) {}
    }

    // 空時のヒント表示（お気に入りコンテナが空のとき）
    if (tabName === 'favorites') {
      var favEl = document.getElementById('favorites-container');
      if (favEl && !favEl.innerHTML.trim()) {
        favEl.innerHTML = '<div class="card"><div style="padding:20px;text-align:center;color:#6b4423;font-size:15px;">⭐ お気に入りはまだありません。<br><span style="font-size:13px;">レシピ画面でハートを押すと保存されます。</span></div><div style="text-align:center;padding-bottom:16px;"><button type="button" class="fav-history-btn" id="open-history-modal-empty">📋 履歴</button></div></div>';
        var emptyBtn = document.getElementById('open-history-modal-empty');
        if (emptyBtn) emptyBtn.addEventListener('click', function () {
          if (typeof window.openHistoryModal === 'function') window.openHistoryModal();
        });
        try { if (typeof updateHistoryButtonLabel === 'function') updateHistoryButtonLabel(); } catch (_) {}
      }
    }
    if (tabName === 'shopping') {
      var shopEl = document.getElementById('shopping-container');
      if (shopEl && !shopEl.innerHTML.trim()) {
        shopEl.innerHTML = '<div class="card"><div style="padding:20px;text-align:center;color:#6b4423;font-size:15px;">🛒 買い物リストは空です。<br><span style="font-size:13px;">レシピから食材を追加できます。</span></div></div>';
      }
    }

    // スクロールをトップへ（モバイルアプリ標準動作）
    try { window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' }); } catch (_) { window.scrollTo(0, 0); }
  }

  tabbar.addEventListener('click', function (e) {
    var btn = e.target.closest('.tab');
    if (!btn) return;
    activateTab(btn.dataset.tab);
  });

  // 初期: ホームタブを有効化（冷蔵庫・買い物・お気に入り・履歴を非表示）
  // ただし最初は panel-fridge などが既に DOM にあるので隠す
  ['#panel-fridge', '#favorites-container', '#shopping-container', '#history-container']
    .forEach(function (sel) {
      document.querySelectorAll(sel).forEach(function (el) { el.style.display = 'none'; });
    });

  // レシピ生成後に結果が表示されるが、「ホームタブ以外」を見ているときに自動でホームへ戻すのは避ける。
  // ただし、お気に入り追加などで既存のrender関数が呼ばれたとき、該当タブが見えていなければ非表示を維持する。
  function reHideIfInactive() {
    var activeTab = tabbar.querySelector('.tab.active');
    var tabName = activeTab ? activeTab.dataset.tab : 'home';
    if (tabName !== 'favorites') {
      var f = document.getElementById('favorites-container');
      if (f) f.style.display = 'none';
    }
    // 履歴コンテナは常に非表示（履歴はモーダル表示のみ）
    var h = document.getElementById('history-container');
    if (h) h.style.display = 'none';
    if (tabName !== 'shopping') {
      var s = document.getElementById('shopping-container');
      if (s) s.style.display = 'none';
    }
    if (tabName !== 'fridge') {
      var fr = document.getElementById('panel-fridge');
      if (fr) fr.style.display = 'none';
    }
  }

  // 既存のrender関数をラップ
  ['renderFavorites', 'renderShoppingList', 'renderHistory', 'renderFridge'].forEach(function (fname) {
    var orig = window[fname];
    if (typeof orig !== 'function') return;
    window[fname] = function () {
      var r = orig.apply(this, arguments);
      try { reHideIfInactive(); } catch (_) {}
      return r;
    };
  });

  // レシピ生成ボタンが押されたら強制的にホームタブへ切替
  ['generate', 'generate-meal', 'generate-weekly', 'generate-remix', 'fridge-use'].forEach(function (id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('click', function () {
      var active = tabbar.querySelector('.tab.active');
      if (!active || active.dataset.tab !== 'home') {
        activateTab('home');
      }
    }, true); // capture: 他のhandlerより先に実行
  });

  window.__activateTab = activateTab;
})();

/* ============================================================
 * === Toast helper (showToast) - reuse showSnackbar
 * ============================================================ */
(function () {
  'use strict';
  // showToast(message, {variant: 'success'|'info'|'default', duration: ms})
  window.showToast = function (message, opts) {
    opts = opts || {};
    var duration = typeof opts.duration === 'number' ? opts.duration : 2500;
    var variant = opts.variant || 'success';

    // 既存 showSnackbar を流用（action 無しでタイマー経過→自動消滅）
    if (typeof window.showSnackbar !== 'function') {
      // フォールバック: なにもしない
      return;
    }
    window.showSnackbar(message, {
      duration: duration,
    });

    // snackbar要素に variant クラスを一時付与
    var sb = document.getElementById('undo-snackbar');
    if (!sb) return;
    sb.classList.remove('toast-success', 'toast-info');
    if (variant === 'success') sb.classList.add('toast-success');
    else if (variant === 'info') sb.classList.add('toast-info');

    // duration 経過後にクラス削除
    setTimeout(function () {
      if (sb) {
        sb.classList.remove('toast-success', 'toast-info');
      }
    }, duration + 400);
  };

  // 既存のお気に入り・買い物・冷蔵庫・設定アクションにトーストを追加
  // 既存の showSnackbar 呼び出しがない箇所にフックする
  document.addEventListener('DOMContentLoaded', function () {
    hookToasts();
  });
  if (document.readyState !== 'loading') {
    hookToasts();
  }

  function hookToasts() {
    // 設定保存
    var saveBtn = document.getElementById('settings-save');
    if (saveBtn && !saveBtn.__toastHooked) {
      saveBtn.__toastHooked = true;
      saveBtn.addEventListener('click', function () {
        setTimeout(function () {
          window.showToast('⚙️ 設定を保存しました', { variant: 'success', duration: 2200 });
        }, 50);
      });
    }
    // 冷蔵庫 追加
    var fridgeAdd = document.getElementById('fridge-add');
    if (fridgeAdd && !fridgeAdd.__toastHooked) {
      fridgeAdd.__toastHooked = true;
      fridgeAdd.addEventListener('click', function () {
        var nameEl = document.getElementById('fridge-name');
        var n = nameEl && nameEl.value && nameEl.value.trim();
        setTimeout(function () {
          // 追加成功時のみトースト（上限時は alert が先に出ている）
          if (n) {
            window.showToast('🧊 冷蔵庫に追加しました', { variant: 'success', duration: 2000 });
          }
        }, 80);
      });
    }
  }

  // 既存の addFavorite / addToShoppingList などをラップしてトースト表示
  function wrapAddFavorite() {
    if (typeof window.addFavorite !== 'function' || window.addFavorite.__toastWrapped) return;
    var orig = window.addFavorite;
    window.addFavorite = function (recipe) {
      var r = orig.apply(this, arguments);
      try { window.showToast('⭐ お気に入りに追加しました', { variant: 'success', duration: 2200 }); } catch (_) {}
      return r;
    };
    window.addFavorite.__toastWrapped = true;
  }

  // ShoppingList 追加系はコード内で直接 push しているケースが多いので、
  // saveShoppingList 呼び出し回数の増加を検知するより、主要な UI フック箇所で showToast を明示呼び出し。
  // ここでは saveShoppingList のラップは避け、既存 showSnackbar 呼び出しがない操作のみ拾う。

  // 初期化を遅延（他の定義が済んだ後）
  setTimeout(wrapAddFavorite, 0);
})();

/* ============================================================
 * === Skeleton loading for recipe/meal candidate generation
 * ============================================================ */
(function () {
  'use strict';

  function buildSkeletonHtml(label) {
    var card = '<div class="skeleton-card">' +
      '<div class="skeleton-line title"></div>' +
      '<div class="skeleton-line meta"></div>' +
      '<div class="skeleton-line summary"></div>' +
      '<div class="skeleton-line summary short"></div>' +
      '</div>';
    return '<div class="card">' +
      '<div class="skeleton-intro">' + label + '</div>' +
      '<div class="skeleton-candidates">' + card + card + card + '</div>' +
      '</div>';
  }

  // #result を監視し、ローディング表示（「3つのレシピ候補を考えています...」「3つの献立候補を考えています...」）をスケルトンに差し替える
  function upgradeLoading() {
    var result = document.getElementById('result');
    if (!result) return;
    // 内部の .loading テキストからタイプを判別
    var loading = result.querySelector('.loading');
    if (!loading) return;
    var txt = (loading.textContent || '').trim();
    var isRecipe = txt.indexOf('レシピ候補') !== -1;
    var isMeal = txt.indexOf('献立候補') !== -1;
    if (!isRecipe && !isMeal) return;
    var label = isMeal ? '3つの献立候補を考えています…' : '3つのレシピ候補を考えています…';
    result.innerHTML = buildSkeletonHtml(label);
  }

  // #result の mutation を監視
  var result = document.getElementById('result');
  if (result && 'MutationObserver' in window) {
    var obs = new MutationObserver(function () {
      upgradeLoading();
    });
    obs.observe(result, { childList: true, subtree: true });
  }
})();


// === 削除確認ポップアップ制御 ===
// HTMLがscript後にあるためDOMContentLoaded後に初期化
document.addEventListener('DOMContentLoaded', function () {
  var overlay = document.getElementById('delete-confirm');
  var nameEl = document.getElementById('dc-recipe-name');
  var cancelBtn = document.getElementById('dc-cancel-btn');
  var deleteBtn = document.getElementById('dc-delete-btn');
  if (!overlay || !nameEl || !cancelBtn || !deleteBtn) return;

  var pendingCallback = null;
  var pendingCancelCallback = null;

  window.showDeleteConfirm = function (recipeName, onConfirm, onCancel) {
    nameEl.textContent = recipeName || '';
    pendingCallback = onConfirm || null;
    pendingCancelCallback = onCancel || null;
    overlay.classList.add('active');
  };

  function close(cancelled) {
    overlay.classList.remove('active');
    var cancelCb = pendingCancelCallback;
    pendingCallback = null;
    pendingCancelCallback = null;
    if (cancelled && typeof cancelCb === 'function') cancelCb();
  }

  cancelBtn.addEventListener('click', function () { close(true); });
  overlay.addEventListener('click', function (e) { if (e.target === overlay) close(true); });
  deleteBtn.addEventListener('click', function () {
    var cb = pendingCallback;
    close(false);
    if (typeof cb === 'function') cb();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && overlay.classList.contains('active')) close(true);
  });
});

</script>

  <div class="delete-confirm-dialog">
    <div class="dc-title">このレシピを削除しますか？</div>
    <div class="dc-name" id="dc-recipe-name"></div>
    <div class="dc-actions">
      <button type="button" class="dc-cancel" id="dc-cancel-btn">元に戻す</button>
      <button type="button" class="dc-delete" id="dc-delete-btn">削除</button>
    </div>
  </div>
</div>
