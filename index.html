<style>

    font-size: 16px;

    color: #fff;

    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(232, 89, 12, 0.3);
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:active { transform: translateY(1px); box-shadow: 0 2px 6px rgba(232, 89, 12, 0.3); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  /* #13: Cancel state button style */

  .chip {

<body>
<div class="wrap">
  <header>
    <h1>🍳 レシピ提案AI</h1>
    <p>あなたにぴったりのレシピをAIが考えます</p>
  </header>

  <div class="card">
    <div class="field">
      <label for="craving">🍽 食べたいもの・料理のイメージ</label>
      <input type="text" id="craving" placeholder="例：さっぱりした和食" aria-label="食べたいもの・料理のイメージ">
    </div>
    <div class="field">
      <label for="ingredients">🥬 冷蔵庫にある食材</label>
      <textarea id="ingredients" placeholder="例：鶏肉、玉ねぎ、卵" aria-label="冷蔵庫にある食材"></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label for="servings">👥 人数</label>
        <input type="text" id="servings" placeholder="2人" aria-label="人数">
      </div>
      <div class="field">
        <label for="time">⏱ 調理時間</label>
        <input type="text" id="time" placeholder="30分以内" aria-label="調理時間">
      </div>
    </div>
    <div class="field">

        <div class="chip" data-val="ダイエット" role="button" tabindex="0" aria-pressed="false">ダイエット</div>

  <div id="history-container"></div>
</div>

<script>
// #12: Service Worker registration (inline via Blob URL for single-file architecture)
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'recipe-ai-v1';
    const STATIC_ASSETS = ['/'];

    self.addEventListener('install', (event) => {
      event.waitUntil(
        caches.open(CACHE_NAME).then((cache) => cache.addAll(STATIC_ASSETS))
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', (event) => {
      event.waitUntil(
        caches.keys().then((keys) =>
          Promise.all(keys.filter((k) => k !== CACHE_NAME).map((k) => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', (event) => {
      const url = new URL(event.request.url);

      // Do not cache API requests
      if (url.origin !== self.location.origin) return;

      // Network First strategy
      event.respondWith(
        fetch(event.request)
          .then((response) => {
            const clone = response.clone();
            caches.open(CACHE_NAME).then((cache) => cache.put(event.request, clone));
            return response;
          })
          .catch(() => caches.match(event.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {
    // Service Worker registration failed silently (e.g., non-HTTPS context)
  });
}

// Workers API endpoint
const API_URL = 'https://recipe-api.kero-recipe.workers.dev';

// #13: AbortController for cancel functionality
let currentAbortController = null;

// --- #8: History management ---
const HISTORY_KEY = 'recipeHistory';
const HISTORY_MAX = 10;

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch {
    return [];
  }
}

function saveHistory(history) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch {
    // QuotaExceededError: silently ignore
  }
}

function addToHistory(recipe) {
  const history = loadHistory();
  const entry = {
    name: recipe.name || '名前なし',
    date: new Date().toLocaleString('ja-JP'),
    recipe: recipe,
  };
  history.unshift(entry);
  if (history.length > HISTORY_MAX) history.pop();
  saveHistory(history);
  renderHistory();
}

function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('history-container');
  const history = loadHistory();
  if (history.length === 0) {
    container.innerHTML = '';
    return;
  }
  const items = history.map((entry, idx) =>
    `<div class="history-item" data-idx="${idx}">
      <span class="history-name">${escapeHtml(entry.name)}</span>
      <span class="history-date">${escapeHtml(entry.date)}</span>
    </div>`
  ).join('');
  container.innerHTML = `
    <div class="card history-section">
      <div class="section-header">
        <h3>📋 履歴</h3>
        <button class="history-clear-btn" id="clear-history">履歴をクリア</button>
      </div>
      ${items}
    </div>
  `;
  document.getElementById('clear-history').addEventListener('click', clearHistory);
  container.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx, 10);
      const entry = loadHistory()[idx];
      if (entry && entry.recipe) {
        renderEntry(entry.recipe);
      }
    });
  });
}

// --- Favorites management ---
const FAVORITES_KEY = 'recipe_favorites';
const FAVORITES_MAX = 50;

function loadFavorites() {
  try {
    return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];
  } catch {
    return [];
  }
}

function saveFavorites(favorites) {
  try {
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      alert('ストレージの容量が不足しています。古いお気に入りを削除してください。');
    }
  }
}

function getFavoriteKey(recipe) {
  // Use recipe name as the unique key for matching
  return (recipe.name || '').trim();
}

function isFavorite(recipe) {
  const key = getFavoriteKey(recipe);
  if (!key) return false;
  const favorites = loadFavorites();
  return favorites.some(f => getFavoriteKey(f.recipe) === key);
}

function addFavorite(recipe) {
  const favorites = loadFavorites();
  if (favorites.length >= FAVORITES_MAX) {
    alert('お気に入りが上限（50件）に達しました。古いお気に入りを削除してから追加してください。');
    return false;
  }
  if (isFavorite(recipe)) return false;
  const entry = {
    id: 'fav_' + Date.now(),
    recipe: recipe,
    savedAt: new Date().toISOString(),
  };
  favorites.unshift(entry);
  saveFavorites(favorites);
  renderFavorites();
  return true;
}

function removeFavorite(recipe) {
  const key = getFavoriteKey(recipe);
  let favorites = loadFavorites();
  favorites = favorites.filter(f => getFavoriteKey(f.recipe) !== key);
  saveFavorites(favorites);
  renderFavorites();
}

function removeFavoriteById(id) {
  let favorites = loadFavorites();
  favorites = favorites.filter(f => f.id !== id);
  saveFavorites(favorites);
  renderFavorites();
}

function clearFavorites() {
  localStorage.removeItem(FAVORITES_KEY);
  renderFavorites();
}

function toggleFavorite(recipe) {
  if (isFavorite(recipe)) {
    removeFavorite(recipe);
    return false;
  } else {
    return addFavorite(recipe);
  }
}

function renderFavorites() {
  const container = document.getElementById('favorites-container');
  const favorites = loadFavorites();
  if (favorites.length === 0) {
    container.innerHTML = '';
    return;
  }
  const items = favorites.map(entry => {
    const savedDate = new Date(entry.savedAt).toLocaleString('ja-JP');
    const name = entry.recipe.name || '名前なし';
    return `<div class="fav-item" data-id="${escapeHtml(entry.id)}">
      <div class="fav-item-info" data-id="${escapeHtml(entry.id)}">
        <div class="fav-name">⭐ ${escapeHtml(name)}</div>
        <div class="fav-date">${escapeHtml(savedDate)}</div>
      </div>
      <button class="fav-delete-btn" data-id="${escapeHtml(entry.id)}">削除</button>
    </div>`;
  }).join('');
  container.innerHTML = `
    <div class="card favorites-section">
      <div class="section-header">
        <h3>⭐ お気に入り</h3>
        <button class="fav-clear-btn" id="clear-favorites">すべてクリア</button>
      </div>
      ${items}
    </div>
  `;
  document.getElementById('clear-favorites').addEventListener('click', () => {
    if (confirm('お気に入りをすべて削除しますか？')) {
      clearFavorites();
      updateFavButtonInResult();
    }
  });
  container.querySelectorAll('.fav-item-info').forEach(info => {
    info.addEventListener('click', () => {
      const id = info.dataset.id;
      const favorites = loadFavorites();
      const entry = favorites.find(f => f.id === id);
      if (entry && entry.recipe) {
        renderEntry(entry.recipe);
      }
    });
  });
  container.querySelectorAll('.fav-delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      removeFavoriteById(id);
      updateFavButtonInResult();
    });
  });
}

// Update the favorite button in the currently displayed recipe card (if any)
function updateFavButtonInResult() {
  const favBtn = document.querySelector('#result .fav-btn');
  if (!favBtn || !favBtn._recipe) return;
  const faved = isFavorite(favBtn._recipe);
  favBtn.className = 'fav-btn ' + (faved ? 'faved' : 'not-faved');
  favBtn.textContent = faved ? '❤️ お気に入り済み' : '🤍 お気に入りに追加';
}

// --- Shopping list management ---
const SHOPPING_KEY = 'recipe_shopping_list';

function loadShoppingList() {
  try {
    return JSON.parse(localStorage.getItem(SHOPPING_KEY)) || [];
  } catch {
    return [];
  }
}

function saveShoppingList(list) {
  try {
    localStorage.setItem(SHOPPING_KEY, JSON.stringify(list));
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      alert('ストレージの容量が不足しています。買い物リストを整理してください。');
    }
  }
}

function addIngredientsToShoppingList(recipe) {
  const list = loadShoppingList();
  const ingredients = recipe.ingredients || [];
  const recipeName = recipe.name || '名前なし';
  const now = new Date().toISOString();
  let addedCount = 0;

  ingredients.forEach((ing, idx) => {
    const name = (ing.name || '').trim();
    if (!name) return;
    // Deduplicate by ingredient name (regardless of recipe)
    const exists = list.some(item => item.name === name);
    if (!exists) {
      list.push({
        id: 'shop_' + Date.now() + '_' + idx,
        name: name,
        amount: (ing.amount || '').trim(),
        recipeName: recipeName,
        checked: false,
        addedAt: now,
      });
      addedCount++;
    }
  });

  saveShoppingList(list);
  renderShoppingList();
  return addedCount;
}

function isRecipeInShoppingList(recipe) {
  const list = loadShoppingList();
  const ingredients = recipe.ingredients || [];
  if (ingredients.length === 0) return false;
  // Consider "added" if ALL ingredients are already in the list
  return ingredients.every(ing => {
    const name = (ing.name || '').trim();
    if (!name) return true; // skip empty names
    return list.some(item => item.name === name);
  });
}

function toggleShoppingItemCheck(id) {
  const list = loadShoppingList();
  const item = list.find(i => i.id === id);
  if (item) {
    item.checked = !item.checked;
    saveShoppingList(list);
    renderShoppingList();
  }
}

function removeShoppingItem(id) {
  let list = loadShoppingList();
  list = list.filter(i => i.id !== id);
  saveShoppingList(list);
  renderShoppingList();
  updateShopButtonInResult();
}

function removeCheckedShoppingItems() {
  let list = loadShoppingList();
  list = list.filter(i => !i.checked);
  saveShoppingList(list);
  renderShoppingList();
  updateShopButtonInResult();
}

function clearShoppingList() {
  localStorage.removeItem(SHOPPING_KEY);
  renderShoppingList();
  updateShopButtonInResult();
}

function updateShopButtonInResult() {
  const shopBtn = document.querySelector('#result .shop-add-btn');
  if (!shopBtn || !shopBtn._recipe) return;
  const isWeeklyBtn = shopBtn.classList.contains('weekly-shop-btn');
  const added = isRecipeInShoppingList(shopBtn._recipe);
  if (isWeeklyBtn) {
    shopBtn.className = 'shop-add-btn weekly-shop-btn ' + (added ? 'added' : 'not-added');
    shopBtn.textContent = added ? '✅ 1週間分の食材を追加済み' : '🛒 1週間分の食材を買い物リストへ';
  } else {
    shopBtn.className = 'shop-add-btn ' + (added ? 'added' : 'not-added');
    shopBtn.textContent = added ? '✅ 買い物リストに追加済み' : '🛒 買い物リストに追加';
  }
}

function renderShoppingList() {
  const container = document.getElementById('shopping-container');
  const list = loadShoppingList();
  if (list.length === 0) {
    container.innerHTML = '';
    return;
  }

  const checkedCount = list.filter(i => i.checked).length;
  const items = list.map(item => {
    const checkedClass = item.checked ? ' checked' : '';
    const checkedAttr = item.checked ? ' checked' : '';
    return `<div class="shop-item${checkedClass}" data-id="${escapeHtml(item.id)}">
      <input type="checkbox" class="shop-item-check" data-id="${escapeHtml(item.id)}"${checkedAttr} aria-label="${escapeHtml(item.name)}の購入チェック">
      <div class="shop-item-info">
        <span class="shop-item-name">${escapeHtml(item.name)}</span>
        <span class="shop-item-amount">${escapeHtml(item.amount)}</span>
        <div class="shop-item-recipe">${escapeHtml(item.recipeName)}</div>
      </div>
      <button class="shop-delete-btn" data-id="${escapeHtml(item.id)}" aria-label="${escapeHtml(item.name)}を削除">×</button>
    </div>`;
  }).join('');

  const clearCheckedBtn = checkedCount > 0
    ? `<button class="shop-clear-checked-btn" id="clear-checked-shopping">購入済みを削除</button>`
    : '';

  container.innerHTML = `
    <div class="card shopping-section">
      <div class="section-header">
        <h3>🛒 買い物リスト（${list.length}品）</h3>
        <div class="shop-actions">
          ${clearCheckedBtn}
          <button class="shop-clear-btn" id="clear-shopping">リストをクリア</button>
        </div>
      </div>
      ${items}
    </div>
  `;

  // Event: clear all
  document.getElementById('clear-shopping').addEventListener('click', () => {
    if (confirm('買い物リストをすべてクリアしますか？')) {
      clearShoppingList();
    }
  });

  // Event: clear checked
  const clearCheckedEl = document.getElementById('clear-checked-shopping');
  if (clearCheckedEl) {
    clearCheckedEl.addEventListener('click', () => {
      removeCheckedShoppingItems();
    });
  }

  // Event: checkboxes
  container.querySelectorAll('.shop-item-check').forEach(cb => {
    cb.addEventListener('change', () => {
      toggleShoppingItemCheck(cb.dataset.id);
    });
  });

  // Event: delete buttons
  container.querySelectorAll('.shop-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      removeShoppingItem(btn.dataset.id);
    });
  });
}

// #15: Chip toggle with aria-pressed update
function toggleChip(chip, group) {
  const wasActive = chip.classList.contains('active');
  group.querySelectorAll('.chip').forEach(c => {
    c.classList.remove('active');
    c.setAttribute('aria-pressed', 'false');
  });
  if (!wasActive) {
    chip.classList.add('active');
    chip.setAttribute('aria-pressed', 'true');
  }
  updateButtonText();
}

// Chip selection (single select) with keyboard support (#15)
function setupChips(groupId) {
  const group = document.getElementById(groupId);
  group.addEventListener('click', (e) => {
    if (!e.target.classList.contains('chip')) return;
    toggleChip(e.target, group);
  });
  // #15: Keyboard support for chips (Enter / Space)
  group.addEventListener('keydown', (e) => {
    if (!e.target.classList.contains('chip')) return;
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleChip(e.target, group);
    }
  });
}
setupChips('difficulty');
setupChips('mood');

function getChipValue(groupId) {
  const active = document.querySelector(`#${groupId} .chip.active`);
  return active ? active.dataset.val : '';
}

// --- #7: Dynamic button text based on input ---
function hasAnyInput() {
  if (document.getElementById('craving').value.trim()) return true;
  if (document.getElementById('ingredients').value.trim()) return true;
  if (document.getElementById('servings').value.trim()) return true;
  if (document.getElementById('time').value.trim()) return true;
  if (document.getElementById('allergy').value.trim()) return true;
  if (getChipValue('difficulty')) return true;
  if (getChipValue('mood')) return true;
  return false;
}

function updateButtonText() {
  const btn = document.getElementById('generate');
  if (btn.disabled && !btn.classList.contains('cancel-state')) return;
  if (btn.classList.contains('cancel-state')) return;
  btn.textContent = hasAnyInput()
    ? 'レシピを提案してもらう'
    : 'おまかせでレシピを提案してもらう';
}

// Attach input listeners for button text update
['craving', 'ingredients', 'servings', 'time', 'allergy'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateButtonText);
});

function buildPrompt() {
  const data = {
    食べたいもの: document.getElementById('craving').value.trim(),
    冷蔵庫の食材: document.getElementById('ingredients').value.trim(),
    人数: document.getElementById('servings').value.trim(),
    調理時間: document.getElementById('time').value.trim(),
    アレルギー制限: document.getElementById('allergy').value.trim(),
    難易度: getChipValue('difficulty'),
    気分シーン: getChipValue('mood'),
  };
  const filled = Object.entries(data)
    .filter(([, v]) => v)
    .map(([k, v]) => `- ${k}: ${v}`)
    .join('\n');

  return `あなたは料理研究家です。以下の条件からレシピを1つ提案してください。
${filled || '- 特に指定なし。おすすめの家庭料理を提案してください。'}

必ず以下のJSON形式のみで回答してください（前後に説明文を付けない）:
{
  "name": "料理名",
  "time": "調理時間（例: 30分）",
  "difficulty": "難易度",
  "cost": "目安費用（円）",
  "ingredients": [{"name": "食材名", "amount": "分量"}],
  "steps": ["手順1", "手順2"],
  "nutrition": {"calories": "kcal", "protein": "g", "carbs": "g", "fat": "g", "salt": "g"},
  "tips": "料理のポイント・アレンジ"
}`;
}

// #9: Robust JSON parsing - try direct parse first, then regex extraction
function parseRecipeJson(text) {
  // First, try parsing the entire text directly
  try {
    return JSON.parse(text);
  } catch {
    // Fall through to regex extraction
  }
  // Extract JSON object from text using regex
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) return null;
  try {
    return JSON.parse(jsonMatch[0]);
  } catch {
    return null;
  }
}

async function generateRecipe() {
  const resultEl = document.getElementById('result');
  const btn = document.getElementById('generate');

  // #13: If currently loading, cancel the request
  if (currentAbortController) {
    currentAbortController.abort();
    return;
  }

  // #13: Create AbortController for this request
  currentAbortController = new AbortController();

  const mealBtn = document.getElementById('generate-meal');
  btn.disabled = false;
  btn.textContent = 'キャンセル';
  btn.classList.add('cancel-state');
  btn.setAttribute('aria-busy', 'true');
  if (mealBtn) mealBtn.disabled = true;
  resultEl.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div>レシピを考えています...</div></div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: buildPrompt() }),
      signal: currentAbortController.signal,
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => null);
      const errMsg = errData?.error || `API エラー (${res.status})`;
      throw new Error(errMsg);
    }

    const json = await res.json();
    const text = json.text;
    if (!text) throw new Error('レスポンスが空でした');

    // #9: Use robust JSON parser
    const recipe = parseRecipeJson(text);
    // #6: Show retry button on JSON parse failure
    if (!recipe) {
      resultEl.innerHTML = `<div class="card"><div class="error">レシピの生成に失敗しました。もう一度お試しください。<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>`;
      return;
    }
    renderRecipe(recipe, true);
  } catch (e) {
    // #13: Handle abort (cancel)
    if (e.name === 'AbortError') {
      resultEl.innerHTML = '<div class="card"><div class="error">リクエストをキャンセルしました。</div></div>';
    } else {
      // #6: Show retry button on error
      resultEl.innerHTML = `<div class="card"><div class="error">${escapeHtml(e.message)}<br><button class="retry-btn" onclick="generateRecipe()">再試行</button></div></div>`;
    }
  } finally {
    currentAbortController = null;
    btn.classList.remove('cancel-state');
    btn.disabled = false;
    btn.setAttribute('aria-busy', 'false');
    const mb = document.getElementById('generate-meal');
    if (mb) mb.disabled = false;
    updateButtonText();
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderRecipe(r, addHistory) {
  const ingredients = (r.ingredients || []).map(i =>
    `<li><span>${escapeHtml(i.name)}</span><span>${escapeHtml(i.amount)}</span></li>`
  ).join('');
  const steps = (r.steps || []).map(s => `<li>${escapeHtml(s)}</li>`).join('');
  const n = r.nutrition || {};

  const faved = isFavorite(r);
  const favBtnClass = faved ? 'fav-btn faved' : 'fav-btn not-faved';
  const favBtnText = faved ? '❤️ お気に入り済み' : '🤍 お気に入りに追加';

  const shopAdded = isRecipeInShoppingList(r);
  const shopBtnClass = shopAdded ? 'shop-add-btn added' : 'shop-add-btn not-added';
  const shopBtnText = shopAdded ? '✅ 買い物リストに追加済み' : '🛒 買い物リストに追加';

  document.getElementById('result').innerHTML = `
    <div class="card recipe">
      <h2>${escapeHtml(r.name || '')}${faved ? ' ⭐' : ''}</h2>

function parseMealJson(text) {
  try { return JSON.parse(text); } catch {}
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) return null;
  try { return JSON.parse(m[0]); } catch { return null; }
}

function getMealIngredients(meal) {
  const out = [];
  (meal.dishes || []).forEach(d => {
    (d.ingredients || []).forEach(i => {
      if (i && i.name) out.push({ name: i.name, amount: i.amount || '' });
    });
  });
  return out;
}

function isMeal(r) {
  return r && (r.type === 'meal' || Array.isArray(r.dishes));
}

async function generateMeal() {
  const resultEl = document.getElementById('result');
  const btn = document.getElementById('generate-meal');
  const otherBtn = document.getElementById('generate');

  if (currentAbortController) {
    currentAbortController.abort();
    return;
  }
  currentAbortController = new AbortController();

  btn.textContent = 'キャンセル';
  btn.classList.add('cancel-state');
  btn.setAttribute('aria-busy', 'true');
  otherBtn.disabled = true;
  resultEl.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div>1食分の献立を考えています...</div></div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: buildMealPrompt() }),
      signal: currentAbortController.signal,
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => null);
      const errMsg = errData?.error || `API エラー (${res.status})`;
      throw new Error(errMsg);
    }
    const json = await res.json();
    const text = json.text;
    if (!text) throw new Error('レスポンスが空でした');

    const meal = parseMealJson(text);
    if (!meal || !Array.isArray(meal.dishes) || meal.dishes.length === 0) {
      resultEl.innerHTML = `<div class="card"><div class="error">献立の生成に失敗しました。もう一度お試しください。<br><button class="retry-btn" onclick="generateMeal()">再試行</button></div></div>`;
      return;
    }
    if (!meal.type) meal.type = 'meal';
    renderMeal(meal, true);
  } catch (e) {
    if (e.name === 'AbortError') {
      resultEl.innerHTML = '<div class="card"><div class="error">リクエストをキャンセルしました。</div></div>';
    } else {
      resultEl.innerHTML = `<div class="card"><div class="error">${escapeHtml(e.message)}<br><button class="retry-btn" onclick="generateMeal()">再試行</button></div></div>`;
    }
  } finally {
    currentAbortController = null;
    btn.classList.remove('cancel-state');
    btn.textContent = '🍱 1食分の献立を提案してもらう';
    btn.setAttribute('aria-busy', 'false');
    otherBtn.disabled = false;
    updateButtonText();
  }
}

function roleClass(role) {
  if (role && role.includes('主')) return 'main';
  if (role && role.includes('副')) return 'side';
  if (role && (role.includes('汁') || role.includes('スープ') || role.includes('味噌'))) return 'soup';
  return 'other';
}

// --- Weekly (1週間分献立) feature ---
const WEEKLY_DAYS_TOTAL = 7;
// Split into 3 requests: days [1,2,3], [4,5], [6,7] to stay within MAX_TOKENS budget
const WEEKLY_BATCHES = [[1, 2, 3], [4, 5], [6, 7]];

function buildWeeklyPrompt(dayNumbers, sharedContext) {
  const data = sharedContext;
  const filled = Object.entries(data)
    .filter(function (kv) { return kv[1]; })
    .map(function (kv) { return '- ' + kv[0] + ': ' + kv[1]; })
    .join('\n');

  const dayList = dayNumbers.join(', ');
  return 'あなたは料理研究家です。1週間分の夕食献立のうち、Day ' + dayList + ' の献立を提案してください。' +
    '各日は主菜1・副菜1・汁物1の計3品で構成します。食材の使い回しを意識し、栄養バランスを考慮してください。\n' +
    '【共通条件】\n' +
    (filled || '- 特に指定なし。家庭的でバランスの良い献立にしてください。') +
    '\n\n必ず以下のJSON形式のみで回答してください（前後に説明文を付けない。手順は各品2〜3ステップで極めて簡潔に）:\n' +
    '{\n' +
    '  "days": [\n' +
    '    {\n' +
    '      "day": ' + dayNumbers[0] + ',\n' +
    '      "title": "その日の献立の短いタイトル",\n' +
    '      "totalTime": "全体の所要時間",\n' +
    '      "dishes": [\n' +
    '        {"role": "主菜", "name": "料理名", "time": "調理時間", "ingredients": [{"name": "食材名", "amount": "分量"}], "steps": ["手順1", "手順2"]},\n' +
    '        {"role": "副菜", "name": "料理名", "time": "調理時間", "ingredients": [{"name": "食材名", "amount": "分量"}], "steps": ["手順1", "手順2"]},\n' +
    '        {"role": "汁物", "name": "料理名", "time": "調理時間", "ingredients": [{"name": "食材名", "amount": "分量"}], "steps": ["手順1", "手順2"]}\n' +
    '      ]\n' +
    '    }\n' +
    '  ]\n' +
    '}\n' +
    'days 配列には Day ' + dayList + ' の合計 ' + dayNumbers.length + ' 日分を必ず含めてください。day フィールドの番号は指定されたものを使ってください。';
}

function parseWeeklyJson(text) {
  try { return JSON.parse(text); } catch (e) {}
  var m = text.match(/\{[\s\S]*\}/);
  if (!m) return null;
  try { return JSON.parse(m[0]); } catch (e) { return null; }
}

function isWeekly(r) {
  return r && (r.type === 'weekly' || Array.isArray(r.days));
}

function getWeeklyAggregatedIngredients(weekly) {
  // Aggregate by ingredient name across all days; concatenate amounts with "+"
  var map = new Map();
  (weekly.days || []).forEach(function (day) {
    (day.dishes || []).forEach(function (dish) {
      (dish.ingredients || []).forEach(function (ing) {
        if (!ing || !ing.name) return;
        var key = (ing.name || '').trim();
        if (!key) return;
        var amt = (ing.amount || '').trim();
        if (!map.has(key)) {
          map.set(key, { name: key, amounts: amt ? [amt] : [], count: 1 });
        } else {
          var entry = map.get(key);
          if (amt) entry.amounts.push(amt);
          entry.count++;
        }
      });
    });
  });
  var out = [];
  map.forEach(function (v) {
    var amount;
    if (v.amounts.length === 0) {
      amount = v.count > 1 ? ('×' + v.count + '回') : '';
    } else {
      // Join amounts; add count suffix if multiple
      amount = v.amounts.join(' + ');
    }
    out.push({ name: v.name, amount: amount });
  });
  return out;
}

function addWeeklyIngredientsToShoppingList(weekly) {
  var aggregated = getWeeklyAggregatedIngredients(weekly);
  var fauxRecipe = {
    name: (weekly.name || '1週間分の献立') + '（週間）',
    ingredients: aggregated,
  };
  return addIngredientsToShoppingList(fauxRecipe);
}

function isWeeklyInShoppingList(weekly) {
  var aggregated = getWeeklyAggregatedIngredients(weekly);
  return isRecipeInShoppingList({ ingredients: aggregated });
}

async function generateWeekly() {
  const resultEl = document.getElementById('result');
  const btn = document.getElementById('generate-weekly');
  const otherBtns = [
    document.getElementById('generate'),
    document.getElementById('generate-meal'),
  ];

  if (currentAbortController) {
    currentAbortController.abort();
    return;
  }
  currentAbortController = new AbortController();

  btn.textContent = 'キャンセル';
  btn.classList.add('cancel-state');
  btn.setAttribute('aria-busy', 'true');
  otherBtns.forEach(function (b) { if (b) b.disabled = true; });
  resultEl.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div>1週間分の献立を考えています... (数十秒かかることがあります)</div></div></div>';

  const sharedContext = {
    食べたいもの: document.getElementById('craving').value.trim(),
    冷蔵庫の食材: document.getElementById('ingredients').value.trim(),
    人数: document.getElementById('servings').value.trim(),
    調理時間: document.getElementById('time').value.trim(),
    アレルギー制限: document.getElementById('allergy').value.trim(),
    難易度: getChipValue('difficulty'),
    気分シーン: getChipValue('mood'),
  };

  try {
    // Fire all batches in parallel
    const requests = WEEKLY_BATCHES.map(function (days) {
      return fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: buildWeeklyPrompt(days, sharedContext) }),
        signal: currentAbortController.signal,
      }).then(async function (res) {
        if (!res.ok) {
          const errData = await res.json().catch(function () { return null; });
          const errMsg = (errData && errData.error) || ('API エラー (' + res.status + ')');
          throw new Error(errMsg);
        }
        return res.json();
      });
    });

    const responses = await Promise.all(requests);

    // Merge all days
    const allDays = [];
    responses.forEach(function (json, batchIdx) {
      const text = json && json.text;
      if (!text) throw new Error('Day ' + WEEKLY_BATCHES[batchIdx].join(',') + ' のレスポンスが空でした');
      const parsed = parseWeeklyJson(text);
      if (!parsed || !Array.isArray(parsed.days)) {
        throw new Error('Day ' + WEEKLY_BATCHES[batchIdx].join(',') + ' の解析に失敗しました');
      }
      parsed.days.forEach(function (d) { allDays.push(d); });
    });

    if (allDays.length < WEEKLY_DAYS_TOTAL) {
      // Try best-effort: fill with what we got, but warn
      if (allDays.length === 0) {
        throw new Error('1週間分の献立データが取得できませんでした');
      }
    }

    // Sort by day number and renumber if needed
    allDays.sort(function (a, b) { return (a.day || 0) - (b.day || 0); });
    allDays.forEach(function (d, i) { d.day = i + 1; });

    const stamp = new Date().toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    const weekly = {
      type: 'weekly',
      name: '1週間分の献立 ' + stamp,
      summary: '7日分の夕食献立を提案します。食材の使い回しと栄養バランスを意識しました。',
      days: allDays.slice(0, WEEKLY_DAYS_TOTAL),
    };

    renderWeekly(weekly, true);
  } catch (e) {
    if (e.name === 'AbortError') {
      resultEl.innerHTML = '<div class="card"><div class="error">リクエストをキャンセルしました。</div></div>';
    } else {
      resultEl.innerHTML = '<div class="card"><div class="error">' + escapeHtml(e.message) + '<br><button class="retry-btn" onclick="generateWeekly()">再試行</button></div></div>';
    }
  } finally {
    currentAbortController = null;
    btn.classList.remove('cancel-state');
    btn.textContent = '📅 1週間分の献立を提案してもらう';
    btn.setAttribute('aria-busy', 'false');
    otherBtns.forEach(function (b) { if (b) b.disabled = false; });
    updateButtonText();
  }
}

        '<div class="dish-name">' + escapeHtml(dish.name || '') + '</div>' +
        '<div class="dish-meta">⏱ ' + escapeHtml(dish.time || '-') + '</div>' +
        '<div class="dish-sub-title">食材</div>' +
        '<ul class="ing">' + ing + '</ul>' +
        '<div class="dish-sub-title">作り方</div>' +
        '<ol class="steps">' + steps + '</ol>' +
        '</div>';
    }).join('');
    return '<div class="' + cls + '" data-panel="' + i + '">' +
      '<div class="day-title">Day ' + escapeHtml(String(d.day || (i + 1))) + '：' + escapeHtml(d.title || '献立') +
      '<span class="day-total">⏱ ' + escapeHtml(d.totalTime || '-') + '</span></div>' +
      dishesHtml +
      '</div>';
  }).join('');

  document.getElementById('result').innerHTML =
    '<div class="card recipe weekly-header">' +
      '<h2>📅 ' + escapeHtml(w.name || '1週間分の献立') + (faved ? ' ⭐' : '') + '</h2>' +
      '<button class="' + favBtnClass + '" id="fav-toggle">' + favBtnText + '</button>' +
      (w.summary ? '<div class="weekly-summary">' + escapeHtml(w.summary) + '</div>' : '') +
      '<button class="' + shopBtnClass + '" id="weekly-shop-toggle">' + shopBtnText + '</button>' +
      '<div class="section-title">曜日を選択</div>' +
      '<div class="day-tabs" role="tablist">' + tabsHtml + '</div>' +
      panelsHtml +
    '</div>';

  // Day tab switching
  const tabs = document.querySelectorAll('#result .day-tab');
  const panels = document.querySelectorAll('#result .day-panel');
  tabs.forEach(function (tab) {
    tab.addEventListener('click', function () {
      const idx = parseInt(tab.dataset.idx, 10);
      tabs.forEach(function (t) { t.classList.remove('active'); });
      panels.forEach(function (p) { p.classList.remove('active'); });
      tab.classList.add('active');
      const panel = document.querySelector('#result .day-panel[data-panel="' + idx + '"]');
      if (panel) panel.classList.add('active');
    });
    tab.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); tab.click(); }
    });
  });

  // Favorite toggle
  const favBtn = document.getElementById('fav-toggle');
  favBtn._recipe = w;
  favBtn.addEventListener('click', function () {
    if (isFavorite(w)) { removeFavorite(w); } else { addFavorite(w); }
    const newFaved = isFavorite(w);
    favBtn.className = 'fav-btn ' + (newFaved ? 'faved' : 'not-faved');
    favBtn.textContent = newFaved ? '❤️ お気に入り済み' : '🤍 お気に入りに追加';
    const h2 = document.querySelector('#result .recipe h2');
    if (h2) {
      h2.innerHTML = '📅 ' + escapeHtml(w.name || '1週間分の献立') + (newFaved ? ' ⭐' : '');
    }
  });

  // Shopping list add
  const shopBtn = document.getElementById('weekly-shop-toggle');
  shopBtn._recipe = { ingredients: getWeeklyAggregatedIngredients(w) };
  shopBtn.addEventListener('click', function () {
    if (isWeeklyInShoppingList(w)) return;
    const added = addWeeklyIngredientsToShoppingList(w);
    shopBtn.className = 'shop-add-btn weekly-shop-btn added';
    shopBtn.textContent = '✅ 1週間分の食材を追加済み（' + added + '品追加）';
  });

  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });

  if (addHistory !== false) {
    addToHistory(w);
  }
}

document.getElementById('generate-weekly').addEventListener('click', generateWeekly);

document.getElementById('generate-meal').addEventListener('click', generateMeal);

document.getElementById('generate').addEventListener('click', generateRecipe);

// Initialize favorites, shopping list, and history on load
renderFavorites();
renderShoppingList();
renderHistory();
</script>
</body>
</html>
